  // ===== UPDATE =====
  function update(dt) {
    if (shakeDur > 0) {
      shakeDur--;
      shakeX = (Math.random() - 0.5) * 5;
      shakeY = (Math.random() - 0.5) * 5;
    } else { shakeX = 0; shakeY = 0; }

    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05;
      p.life -= p.dec;
      if (p.life <= 0) particles.splice(i, 1);
    }
    // Cap particles to prevent memory explosion
    if (particles.length > 300) particles.splice(0, particles.length - 300);

    for (var i = floats.length - 1; i >= 0; i--) {
      floats[i].y -= 1;
      floats[i].life -= 0.014;
      if (floats[i].life <= 0) floats.splice(i, 1);
    }

    if (trumpTimer > 0) trumpTimer -= dt;

    if (gameState === WAVE_INTRO) {
      waveTimer -= dt;
      if (waveTimer <= 0) {
        gameState = PLAYING;
        if (wave % 3 === 0) {
          spawnBoss();
          darbukaPlaying = true;
        } else {
          spawnWave();
        }
      }
      return;
    }

    if (gameState === BOSS_INTRO) {
      bossIntroTimer -= dt;
      if (bossIntroTimer <= 0) {
        gameState = PLAYING;
      }
      return;
    }

    if (gameState !== PLAYING) return;

    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboCount = 0; }
    if (pInvincible > 0) pInvincible -= dt;
    if (zapperDisableTimer > 0) zapperDisableTimer -= dt;
    if (powerUpTimer > 0) {
      powerUpTimer -= dt;
      if (powerUpTimer <= 0) {
        fireRateMultiplier = 1;
        shotStreams = 1;
        activeAmmos = [];
      }
    }

    // Player movement
    var dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || keys['mLeft']) dx = -1;
    if (keys['ArrowRight'] || keys['KeyD'] || keys['mRight']) dx = 1;
    if (keys['ArrowUp'] || keys['KeyW'] || keys['mUp']) dy = -1;
    if (keys['ArrowDown'] || keys['KeyS_move'] || keys['mDown']) dy = 1;
    px += dx * PSPEED;
    py += dy * PSPEED;
    var minY = H * 0.3;
    var maxY = H - (isMobile ? 60 : 50);
    px = Math.max(PW/2 + 5, Math.min(W - PW/2 - 5, px));
    py = Math.max(minY, Math.min(maxY, py));

    // Stealth key
    if (keys['KeyS'] && stealthReady) {
      keys['KeyS'] = false;
      activateStealth();
    }

    // Shooting
    var now = performance.now();
    var shotCD = BASE_SHOT_CD / fireRateMultiplier;
    if (zapperDisableTimer <= 0) {
      if ((keys['Space'] || keys['mFire']) && now - lastShot > shotCD) {
        fireBullets();
        lastShot = now;
      }
    }


    // Zigzag enemies: sinusoidal side-to-side (clamped to bounds)
    for (var zi = 0; zi < enemies.length; zi++) {
      var ze = enemies[zi];
      if (ze.zigzag && !ze.kamikazeActive) {
        ze.zigzagPhase += dt * 4;
        ze.x += Math.sin(ze.zigzagPhase) * 1.8;
        if (ze.x < 22) ze.x = 22;
        else if (ze.x > W - 22) ze.x = W - 22;
      }
    }

    // Kamikaze enemies removed in V3.2
    // Update stealth plane
    if (stealthPlane) {
      stealthPlane.x += 8;
      if (stealthPlane.phase === 0) {
        for (var i = enemies.length - 1; i >= 0; i--) {
          var e = enemies[i];
          if (Math.abs(e.x - stealthPlane.x) < 60) {
            e.hp -= 20;
            if (e.hp <= 0) {
              score += 50;
              totalKills++;
              boom(e.x, e.y);
              addFloat(e.x, e.y, '+50', '#ff8844');
              enemies.splice(i, 1);
            }
          }
        }
        if (boss && Math.abs(boss.x - stealthPlane.x) < 80) {
          boss.hp -= 20;
          boss.flash = 0.3;
          addFloat(boss.x, boss.y, '-20', '#ff8844');
          bigBoom(boss.x, boss.y);
          if (boss.hp <= 0) {
            defeatBoss();
          }
        }
        for (var i = eBullets.length - 1; i >= 0; i--) {
          if (Math.abs(eBullets[i].x - stealthPlane.x) < 80 && Math.abs(eBullets[i].y - stealthPlane.y) < 100) {
            eBullets.splice(i, 1);
          }
        }
      }
      if (stealthPlane.x > W + 100) {
        stealthPlane = null;
        stealthActive = false;
      }
    }

    // Update player bullets
    for (var i = pBullets.length - 1; i >= 0; i--) {
      var b = pBullets[i];
      b.y -= 7;
      if (b.vx) b.x += b.vx;
      if (b.y < -20) pBullets.splice(i, 1);
    }

    // Update powerups
    for (var i = powerUps.length - 1; i >= 0; i--) {
      var pu = powerUps[i];
      pu.y += pu.vy;
      pu.life -= dt;
      if (pu.life <= 0 || pu.y > H + 20) { powerUps.splice(i, 1); continue; }
      // Magnet: attract power-ups toward player
      if (hasMagnet && magnetTimer > 0) {
        var mdx = px - pu.x, mdy = py - pu.y;
        var mdist = Math.sqrt(mdx*mdx + mdy*mdy) || 1;
        if (mdist < 300) {
          pu.x += (mdx / mdist) * 5;
          pu.y += (mdy / mdist) * 5;
        }
      }
      if (Math.abs(pu.x - px) < PW/2 + 12 && Math.abs(pu.y - py) < PH/2 + 12) {
        collectPowerUp(pu);
        powerUps.splice(i, 1);
      }
    }

    // Magnet timer
    if (magnetTimer > 0) {
      magnetTimer -= dt;
      if (magnetTimer <= 0) { hasMagnet = false; magnetTimer = 0; }
    }

    // Guaranteed power-up every 10 seconds
    if (gameState === PLAYING) {
      guaranteedPowerUpTimer += dt;
      var puInterval = wave < 15 ? 10 : Math.max(3, 10 - Math.floor((wave - 15) / 10) * 2);
      if (guaranteedPowerUpTimer >= puInterval) {
        guaranteedPowerUpTimer = 0;
        // Drop from random X at top of screen
        var gpx = 50 + Math.random() * (W - 100);
        var types_g = ['fireRate', 'split2', 'split3', 'explosive', 'piercing', 'electric', 'heart', 'shield', 'magnet'];
        if (wave >= 9) types_g.push('heart', 'heart', 'shield');
        var gt = types_g[Math.floor(Math.random() * types_g.length)];
        var gcolors = { fireRate: '#ffff00', split2: '#00ff88', split3: '#00ccff', split4: '#ff88ff', explosive: '#ff8844', piercing: '#22ff88', electric: '#aa66ff', heart: '#ff3366', shield: '#44ddff', magnet: '#ff66cc' };
        var glabels = { fireRate: 'FAST', split2: 'x2', split3: 'x3', split4: 'x4', explosive: 'BOOM', piercing: 'PIERCE', electric: 'ZAP', heart: '\u2764\uFE0F', shield: '\uD83D\uDEE1\uFE0F', magnet: '\uD83E\uDDF2' };
        powerUps.push({ x: gpx, y: 20, type: gt, color: gcolors[gt], label: glabels[gt], life: 12, vy: 4.8 });
        addFloat(gpx, 40, '\u2B07 POWER-UP!', '#ffd700');
      }
    }

    // BOSS UPDATE
    if (boss) {
      if (boss.y < boss.targetY) {
        boss.y += 1.5;
      } else {
        boss.moveTimer += dt;
        if (boss.flash > 0) boss.flash -= dt;

        // Rage mode when HP < 30%
        if (!boss.rageMode && boss.hp < boss.maxHp * 0.3) {
          boss.rageMode = true;
          addFloat(boss.x, boss.y - 40, '⚠ RAGE MODE! ⚠', '#ff0000');
          shakeDur = 15;
        }

        // Boss immunity timer
        if (boss.immunity > 0) {
          boss.immunity -= dt;
        }

        var moveAmp = wave >= 12 ? 3.5 : (wave >= 9 ? 2.8 : 2);
        var moveSpd = wave >= 12 ? 2.5 : (wave >= 9 ? 2.0 : 1.5);
        if (boss.rageMode) { moveAmp *= 1.5; moveSpd *= 1.4; }

        // Full-screen roaming (wave 30+)
        if (boss.canRoam) {
          // Pick new roam target periodically
          if (Math.random() < 0.01) {
            boss.roamTargetX = 80 + Math.random() * (W - 160);
            boss.roamTargetY = 60 + Math.random() * (H * 0.5);
          }
          var rdx = boss.roamTargetX - boss.x;
          var rdy = boss.roamTargetY - boss.y;
          var roamSpeed = boss.rageMode ? 3.5 : 2.5;
          boss.x += Math.sign(rdx) * Math.min(Math.abs(rdx), roamSpeed);
          boss.y += Math.sign(rdy) * Math.min(Math.abs(rdy), roamSpeed * 0.7);
          boss.x = Math.max(boss.size, Math.min(W - boss.size, boss.x));
          boss.y = Math.max(50, Math.min(H * 0.55, boss.y));

          // Boss touching player (wave 30+) = damage
          if (pInvincible <= 0) {
            var bdx = boss.x - px, bdy = boss.y - py;
            if (Math.sqrt(bdx*bdx + bdy*bdy) < boss.size + PW/2) {
              hitPlayer();
              addFloat(px, py - 30, 'BOSS TOUCH!', '#ff0000');
            }
          }
        } else if (wave >= 9 && boss.chargeTimer > 0) {
          boss.chargeTimer -= dt;
          boss.x += boss.chargeDir * 6;
          boss.x = Math.max(boss.size, Math.min(W - boss.size, boss.x));
        } else {
          boss.x += Math.sin(boss.moveTimer * moveSpd) * moveAmp;
          if (wave >= 9 && Math.random() < 0.003 * (boss.rageMode ? 3 : 1)) {
            boss.chargeDir = px > boss.x ? 1 : -1;
            boss.chargeTimer = 0.5;
          }
        }

        // Determine attack pattern based on wave
        var bulletSpeed = Math.min(8, 3 + wave * 0.15);
        if (boss.rageMode) bulletSpeed *= 1.3;
        var burstMax = wave >= 12 ? 8 : (wave >= 9 ? 6 : 5);
        var pauseTime = wave >= 12 ? 0.6 : (wave >= 9 ? 1.0 : 1.5);
        if (boss.rageMode) pauseTime *= 0.6;
        var shootInterval = wave >= 12 ? 0.15 : (wave >= 9 ? 0.2 : 0.3);

        if (boss.shootPhase === 0) {
          boss.shootTimer -= dt;
          if (boss.shootTimer <= 0) {
            // Attack pattern varies by wave
            if (wave >= 12) {
              // NIGHTMARE: spiral + spread + aimed
              boss.spiralAngle += 0.4;
              var numBullets = boss.rageMode ? 10 : 7;
              for (var s = 0; s < numBullets; s++) {
                var angle = boss.spiralAngle + (s / numBullets) * 6.28;
                eBullets.push({
                  x: boss.x, y: boss.y + boss.size * 0.6,
                  vx: Math.cos(angle) * bulletSpeed * 0.7,
                  vy: Math.sin(angle) * bulletSpeed * 0.5 + bulletSpeed * 0.5,
                  boss: true
                });
              }
              // Also fire aimed shot at player
              var aimDx = px - boss.x, aimDy = py - boss.y;
              var aimDist = Math.sqrt(aimDx*aimDx + aimDy*aimDy) || 1;
              eBullets.push({
                x: boss.x, y: boss.y + boss.size * 0.6,
                vx: (aimDx/aimDist) * bulletSpeed * 1.2,
                vy: (aimDy/aimDist) * bulletSpeed * 1.2,
                boss: true
              });
            } else if (wave >= 9) {
              // RAGE: alternating spread + aimed bursts
              if (boss.burstCount % 2 === 0) {
                // Wide spread
                for (var s = -3; s <= 3; s++) {
                  eBullets.push({
                    x: boss.x + s * 12,
                    y: boss.y + boss.size * 0.6,
                    vx: s * 1.0,
                    vy: bulletSpeed,
                    boss: true
                  });
                }
              } else {
                // Aimed triple shot at player
                var aimDx = px - boss.x, aimDy = py - boss.y;
                var aimDist = Math.sqrt(aimDx*aimDx + aimDy*aimDy) || 1;
                for (var sp = -1; sp <= 1; sp++) {
                  eBullets.push({
                    x: boss.x + sp * 15,
                    y: boss.y + boss.size * 0.6,
                    vx: (aimDx/aimDist) * bulletSpeed + sp * 0.5,
                    vy: (aimDy/aimDist) * bulletSpeed,
                    boss: true
                  });
                }
              }
            } else {
              // Normal boss: simple spread
              for (var s = -2; s <= 2; s++) {
                eBullets.push({
                  x: boss.x + s * 15,
                  y: boss.y + boss.size * 0.6,
                  vx: s * 0.8,
                  vy: bulletSpeed,
                  boss: true
                });
              }
            }

            boss.burstCount++;
            if (boss.burstCount >= burstMax) {
              boss.shootPhase = 1;
              boss.pauseTimer = pauseTime;
              boss.burstCount = 0;
              boss.attackPattern = (boss.attackPattern + 1) % 3;
            } else {
              boss.shootTimer = shootInterval;
            }
          }
        } else {
          boss.pauseTimer -= dt;
          if (boss.pauseTimer <= 0) {
            boss.shootPhase = 0;
            boss.shootTimer = shootInterval;
          }
        }
      }

      // Bullet-boss collision
      for (var bi = pBullets.length - 1; bi >= 0; bi--) {
        var b = pBullets[bi];
        var dx2 = b.x - boss.x, dy2 = b.y - boss.y;
        if (dx2*dx2 + dy2*dy2 < (boss.size+10)*(boss.size+10)) {
          var dmg = 1;
          if (b.ammoTypes && b.ammoTypes.length > 0) {
            for (var at = 0; at < b.ammoTypes.length; at++) {
              if (b.ammoTypes[at] === 1) { dmg += 3; boom(b.x, b.y); }
              else if (b.ammoTypes[at] === 2) dmg += 2;
              else if (b.ammoTypes[at] === 3) { dmg += 1; addP(b.x, b.y, '#aa66ff', 5, 2); }
            }
          }

          if (boss.immunity > 0) {
            dmg = 0;
            addFloat(b.x, b.y - 10, 'IMMUNE!', '#ffffff');
          }
          boss.hp -= dmg;
          boss.flash = 0.1;
          interceptFX(b.x, b.y);
          playSfxHit();
          addFloat(b.x, b.y - 10, '-' + dmg, '#ff8844');

          if (!b.ammoTypes || b.ammoTypes.indexOf(2) === -1) {
            pBullets.splice(bi, 1);
          }

          if (boss.hp <= 0) {
            defeatBoss();
            break;
          }
        }
      }
    }

    // Mini Boss update
    for (var mbi = miniBosses.length - 1; mbi >= 0; mbi--) {
      var mb = miniBosses[mbi];
      // Move toward target
      if (mb.y < mb.targetY) {
        mb.y += 2;
      } else {
        mb.moveTimer += dt * 2;
        // Roam around
        if (Math.random() < 0.015) {
          mb.roamTargetX = 60 + Math.random() * (W - 120);
          mb.roamTargetY = 60 + Math.random() * (H * 0.5);
        }
        var mdx = mb.roamTargetX - mb.x;
        var mdy = mb.roamTargetY - mb.y;
        mb.x += Math.sign(mdx) * Math.min(Math.abs(mdx), 2);
        mb.y += Math.sign(mdy) * Math.min(Math.abs(mdy), 1.5);
        mb.x = Math.max(mb.size, Math.min(W - mb.size, mb.x));
        mb.y = Math.max(40, Math.min(H * 0.5, mb.y));

        // Shoot at player
        mb.shootTimer -= dt;
        if (mb.shootTimer <= 0) {
          mb.shootTimer = 1.5 + Math.random();
          var aDx = px - mb.x, aDy = py - mb.y;
          var aDist = Math.sqrt(aDx*aDx + aDy*aDy) || 1;
          var mbSpeed = Math.min(5, 3 + wave * 0.02);
          eBullets.push({
            x: mb.x, y: mb.y + mb.size * 0.5,
            vx: (aDx/aDist) * mbSpeed,
            vy: (aDy/aDist) * mbSpeed,
            miniBoss: true
          });
        }

        // Touch player = 2 lives damage (not instant kill)
        if (pInvincible <= 0) {
          var tbdx = mb.x - px, tbdy = mb.y - py;
          if (Math.sqrt(tbdx*tbdx + tbdy*tbdy) < mb.size + PW/2) {
            hitPlayer();
            hitPlayer();
            addFloat(px, py - 30, 'MINI BOSS HIT! -2', '#ff44ff');
          }
        }
      }
      if (mb.flash > 0) mb.flash -= dt;

      // Player bullets hit mini boss
      for (var bi = pBullets.length - 1; bi >= 0; bi--) {
        var b = pBullets[bi];
        var dx2 = b.x - mb.x, dy2 = b.y - mb.y;
        if (dx2*dx2 + dy2*dy2 < (mb.size+8)*(mb.size+8)) {
          var dmg = 1;
          if (b.ammoTypes && b.ammoTypes.length > 0) {
            for (var at = 0; at < b.ammoTypes.length; at++) {
              if (b.ammoTypes[at] === 1) { dmg += 3; boom(b.x, b.y); }
              else if (b.ammoTypes[at] === 2) dmg += 2;
              else if (b.ammoTypes[at] === 3) { dmg += 1; addP(b.x, b.y, '#aa66ff', 5, 2); }
            }
          }
          mb.hp -= dmg;
          mb.flash = 0.1;
          interceptFX(b.x, b.y);
          playSfxHit();
          addFloat(b.x, b.y - 10, '-' + dmg, '#ff88ff');
          if (!b.ammoTypes || b.ammoTypes.indexOf(2) === -1) pBullets.splice(bi, 1);
          if (mb.hp <= 0) {
            score += mb.maxHp * 10;
            totalKills += 5;
            killsSinceLastStealth += 5;
            bigBoom(mb.x, mb.y);
            addFloat(mb.x, mb.y, 'MINI BOSS DOWN!', '#ff44ff');
            miniBosses.splice(mbi, 1);
            break;
          }
        }
      }
    }

    // Enemy update (regular enemies)
    if (!boss) {
      var hitEdge = false;
      for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];
        // Atom bombs move straight down, ignoring grid
        if (e.atomBomb) {
          e.y += e.atomSpeed;
          if (e.flash > 0) e.flash -= dt;
          continue;
        }
        // Mega enemies move independently
        if (e.mega) {
          e.y += 0.3 + wave * 0.005;
          e.x += Math.sin(performance.now() / 1000 + e.y * 0.01) * 1.5;
          e.x = Math.max(e.size, Math.min(W - e.size, e.x));
          if (e.flash > 0) e.flash -= dt;
          continue;
        }
        e.x += eDirX * eSpeed;
        if (e.x < 22) { e.x = 22; hitEdge = true; }
        else if (e.x > W - 22) { e.x = W - 22; hitEdge = true; }
        if (e.flash > 0) e.flash -= dt;
      }
      if (hitEdge) {
        eDirX *= -1;
        var dropAmt = Math.max(4, 10 - wave * 0.3);
        for (var i = 0; i < enemies.length; i++) {
          if (!enemies[i].atomBomb && !enemies[i].mega) enemies[i].y += dropAmt;
        }
      }

      // Enemy shooting
      for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];

        // Atom bombs don't shoot
        if (e.atomBomb) continue;

        // Zapper zap attack
        if (e.zapper) {
          e.zapCD -= dt * 1000;
          if (e.zapCD <= 0) {
            e.zapCD = 3000 + Math.random() * 2000;
            // Fire zap toward player
            var zapDx = px - e.x, zapDy = py - e.y;
            var zapDist = Math.sqrt(zapDx*zapDx + zapDy*zapDy) || 1;
            var zapSpeed = Math.min(5, 3 + wave * 0.03);
            eBullets.push({
              x: e.x, y: e.y + e.size,
              vx: (zapDx/zapDist) * zapSpeed,
              vy: (zapDy/zapDist) * zapSpeed,
              isZap: true
            });
          }
        }

        // Mega guided missiles
        if (e.mega) {
          e.megaMissileCD -= dt * 1000;
          if (e.megaMissileCD <= 0) {
            e.megaMissileCD = 1200 + Math.random() * 800;
            var misDx = px - e.x, misDy = py - e.y;
            var misDist = Math.sqrt(misDx*misDx + misDy*misDy) || 1;
            var normalBulletSpeed = Math.min(4.5, 2.5 + wave * 0.18);
            var misSpeed = normalBulletSpeed * 2; // 2x normal speed
            eBullets.push({
              x: e.x, y: e.y + e.size,
              vx: (misDx/misDist) * misSpeed,
              vy: (misDy/misDist) * misSpeed,
              isMegaMissile: true,
              trackTimer: 2.0 // tracks player for 2 seconds
            });
          }
          continue; // mega doesn't use regular shooting
        }

        // Regular enemy shooting
        e.shootCD -= dt * 1000;
        if (e.shootCD <= 0) {
          e.shootCD = Math.max(1200, 2800 - wave * 100) + Math.random() * 2500;
          if (Math.random() < Math.min(0.85, 0.25 + wave * 0.05)) {
            var bulletSpeed = Math.min(4.5, 2.5 + wave * 0.18);
            eBullets.push({ x: e.x, y: e.y + e.size, vx: 0, vy: bulletSpeed });
          }
        }
      }
    }

    // Update enemy bullets
    for (var i = eBullets.length - 1; i >= 0; i--) {
      var eb = eBullets[i];
      // Mega guided missiles track player briefly
      if (eb.isMegaMissile && eb.trackTimer > 0) {
        eb.trackTimer -= dt;
        var tDx = px - eb.x, tDy = py - eb.y;
        var tDist = Math.sqrt(tDx*tDx + tDy*tDy) || 1;
        var curSpeed = Math.sqrt(eb.vx*eb.vx + eb.vy*eb.vy);
        eb.vx += (tDx/tDist) * 0.15;
        eb.vy += (tDy/tDist) * 0.15;
        // Normalize to maintain speed
        var newDist = Math.sqrt(eb.vx*eb.vx + eb.vy*eb.vy) || 1;
        eb.vx = (eb.vx/newDist) * curSpeed;
        eb.vy = (eb.vy/newDist) * curSpeed;
      }
      eb.y += eb.vy;
      if (eb.vx) eb.x += eb.vx;
      if (eb.y > H + 20 || eb.x < -20 || eb.x > W + 20 || eb.y < -20) eBullets.splice(i, 1);
    }
    // Cap eBullets to prevent memory explosion
    if (eBullets.length > 200) eBullets.splice(0, eBullets.length - 200);

    // Player bullet vs enemies
    for (var bi = pBullets.length - 1; bi >= 0; bi--) {
      var b = pBullets[bi];
      var hitEnemy = false;
      for (var ei = enemies.length - 1; ei >= 0; ei--) {
        var e = enemies[ei];
        var dx2 = b.x - e.x, dy2 = b.y - e.y;
        if (dx2*dx2 + dy2*dy2 < (e.size+5)*(e.size+5)) {
          hitEnemy = true;
          var dmg = 1; // base damage
          if (b.ammoTypes && b.ammoTypes.length > 0) {
            for (var at = 0; at < b.ammoTypes.length; at++) {
              if (b.ammoTypes[at] === 1) { dmg += 3; boom(b.x, b.y); }
              else if (b.ammoTypes[at] === 2) dmg += 2;
              else if (b.ammoTypes[at] === 3) { dmg += 1; addP(b.x, b.y, '#aa66ff', 5, 2); }
            }
          }

          // Shielded enemies: shield absorbs damage first
          if (e.shielded && e.shieldHP > 0) {
            e.shieldHP -= dmg;
            e.flash = 0.15;
            addP(e.x, e.y, '#44aaff', 5, 2);
            if (e.shieldHP <= 0) {
              e.shielded = false;
              addFloat(e.x, e.y - 15, 'SHIELD DOWN!', '#44aaff');
            }
            playSfxHit();
          } else {
          e.hp -= dmg;
          e.flash = 0.15;
          playSfxHit();
          if (e.hp <= 0) {
            comboCount++;
            comboTimer = 2.5;
            var pts = 10 * comboCount;
            if (selectedDefender === 'bengurion') pts = Math.floor(pts * 1.5);
            score += pts;
            totalKills++;
            killsSinceLastStealth++;
            checkRankUp();
            boom(e.x, e.y);
            playSfxKill();
            addFloat(e.x, e.y - 12, '+' + pts, comboCount > 3 ? '#fbbf24' : '#60a5fa');
            maybeSpawnPowerUp(e.x, e.y);
            // Splitter: spawn 2 small enemies
            if (e.splitter) {
              for (var si = 0; si < 2; si++) {
                enemies.push({
                  x: e.x + (si === 0 ? -15 : 15),
                  y: e.y,
                  size: Math.round(12 * DESKTOP_SCALE),
                  hp: Math.max(1, Math.floor(e.maxHp * 0.4)),
                  maxHp: Math.max(1, Math.floor(e.maxHp * 0.4)),
                  flash: 0,
                  shootCD: 1500 + Math.random() * 2000,
                  splitter: false,
                  splitChild: true,
                  kamikaze: false,
                  kamikazeActive: false,
                  shielded: false, shieldHP: 0,
                  zigzag: false, zigzagPhase: 0,
                  tank: false,
                  zapper: false, zapCD: 0,
                  heavy: false,
                  mega: false,
                  atomBomb: false
                });
              }
              addFloat(e.x, e.y + 10, 'SPLIT!', '#ff44ff');
            }
            enemies.splice(ei, 1);

            if (killsSinceLastStealth >= 30 && !stealthReady) {
              stealthReady = true;
              addFloat(W/2, H/2, 'F-35 READY!', '#ff0000');
            }
            updateStealthBtn();

            if (totalKills > 0 && totalKills % 100 === 0 && totalKills !== lastExtraLife) {
              lastExtraLife = totalKills;
              lives = Math.min(lives + 1, 5);
              trumpTimer = 3;
              addFloat(W/2, H/2 - 100, '+1 LIFE!', '#ffd700');
            }
          } else {
            interceptFX(b.x, b.y);
          }
          } // end shield else
          break;
        }
      }
      if (hitEnemy && (!b.ammoTypes || b.ammoTypes.indexOf(2) === -1)) pBullets.splice(bi, 1);
    }

    // Enemy bullets hit player
    if (pInvincible <= 0) {
      for (var i = eBullets.length - 1; i >= 0; i--) {
        var b = eBullets[i];
        if (Math.abs(b.x - px) < PW/2 + 3 && Math.abs(b.y - py) < PH/2 + 3) {
          eBullets.splice(i, 1);
          if (b.isZap) {
            // Zapper: disable shooting for 2 seconds
            zapperDisableTimer = 2.0;
            addFloat(px, py - 30, '⚡ DISABLED!', '#00ffff');
            shakeDur = 5;
            addP(px, py, '#00ffff', 8, 2);
          } else if (b.isMegaMissile) {
            // Mega missile: removes a full life
            hitPlayer();
            addFloat(px, py - 30, '🚀 MISSILE HIT!', '#ff8800');
          } else if (b.boss && wave >= 50) {
            // Boss bullets at wave 50+: 0.3 life damage (accumulates)
            playerHP -= 0.3;
            pInvincible = 0.3;
            shakeDur = 5;
            addP(px, py, '#ff4444', 6, 2);
            if (playerHP <= 0) {
              lives--;
              if (lives <= 0) {
                doGameOver();
              } else {
                playerHP = maxPlayerHP;
                pInvincible = 1.5;
                addFloat(px, py - 30, 'LIFE LOST!', '#ff4444');
              }
            }
          } else {
            hitPlayer();
          }
          break;
        }
      }
    }

    // Enemy reaches bottom
    for (var i = enemies.length - 1; i >= 0; i--) {
      if (enemies[i].y > H - 75) {
        // Atom bomb reaching bottom = instant game over
        if (enemies[i].atomBomb) {
          enemies.splice(i, 1);
          addFloat(W/2, H/2, '☢ ATOM BOMB! ☢', '#ff0000');
          shakeDur = 30;
          bigBoom(W/2, H/2);
          lives = 0;
          doGameOver();
          return;
        }
        boom(enemies[i].x, enemies[i].y);
        // Heavy enemies deal 2 damage
        if (enemies[i].heavy) {
          hitPlayer();
          hitPlayer();
        } else {
          hitPlayer();
        }
        enemies.splice(i, 1);
        if (gameState === GAMEOVER) break;
      }
    }

    // Wave complete
    if (!boss && enemies.length === 0 && miniBosses.length === 0 && gameState === PLAYING) {
      wave++;
      score += wave * 50;
      updateHUD();
      gameState = WAVE_INTRO;
      waveTimer = 2.0;
      playSfxWaveStart();
    }

    updateHUD();
  }

  function defeatBoss() {
    score += boss.maxHp * 20;
    totalKills += 10;
    killsSinceLastStealth += 10;
    bigBoom(boss.x, boss.y);
    playSfxBossDeath();
    addFloat(boss.x, boss.y, 'BOSS DEFEATED!', '#ffd700');
    addFloat(boss.x, boss.y + 30, '+' + (boss.maxHp * 20), '#fbbf24');

    // Score for remaining mini bosses

    addFloat(pu.x, pu.y - 15, pu.label + '!', pu.color);

    if (pu.type === 'heart') {
      // Restore 1 HP (or +1 life if HP full)
      if (playerHP < maxPlayerHP) {
        playerHP = maxPlayerHP; // heal to full
        addFloat(pu.x, pu.y - 30, '+1 HP', '#ff3366');
      } else if (lives < 5) {
        lives++;
        addFloat(pu.x, pu.y - 30, '+1 LIFE', '#ff3366');
      } else {
        score += 500;
        addFloat(pu.x, pu.y - 30, '+500', '#ffd700');
      }
      addP(pu.x, pu.y, '#ff3366', 15, 2);
      updateHUD();
      return;
    }
    if (pu.type === 'shield') {
      shieldTimer = 8; // 8 seconds of invincibility
      pInvincible = 8;
      addFloat(pu.x, pu.y - 30, 'SHIELD 8s!', '#44ddff');
      addP(pu.x, pu.y, '#44ddff', 20, 3);
      return;
    }

    powerUpTimer = 12;
    switch (pu.type) {
      case 'fireRate': fireRateMultiplier = Math.min(5, fireRateMultiplier * 2.5); break;
      case 'split2': shotStreams = Math.max(shotStreams, 2); break;
      case 'split3': shotStreams = Math.max(shotStreams, 3); break;
      case 'split4': shotStreams = Math.max(shotStreams, 4); break;
      case 'explosive': if (activeAmmos.indexOf(1) === -1) activeAmmos.push(1); break;
      case 'piercing': if (activeAmmos.indexOf(2) === -1) activeAmmos.push(2); break;
      case 'electric': if (activeAmmos.indexOf(3) === -1) activeAmmos.push(3); break;

  // ===== LO-FI SYNTH GAME MUSIC ENGINE V2 =====
  var musicCtx = null;
  var musicPlaying = false;
  var musicGain = null;
  var delayNode = null;
  var delayGain = null;
  var filterNode = null;
  var musicBPM = 132;
  var musicStep = 0;
  var musicInterval = null;

  function initMusic() {
    if (musicCtx) return;
    try {
      musicCtx = new (window.AudioContext || window.webkitAudioContext)();
      musicGain = musicCtx.createGain();
      musicGain.gain.value = 0.20;

      // === DELAY EFFECT (ping-pong style) ===
      delayNode = musicCtx.createDelay(1.0);
      delayNode.delayTime.value = 60 / musicBPM * 0.75; // dotted-8th delay
      delayGain = musicCtx.createGain();
      delayGain.gain.value = 0.30; // feedback amount
      // Lo-fi filter on delay return
      filterNode = musicCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.frequency.value = 2200;
      filterNode.Q.value = 1.5;

      // Routing: musicGain -> dest + delay -> filter -> delayGain -> delay (feedback)
      musicGain.connect(musicCtx.destination);
      musicGain.connect(delayNode);
      delayNode.connect(filterNode);
      filterNode.connect(delayGain);
      delayGain.connect(musicCtx.destination);
      delayGain.connect(delayNode); // feedback loop
    } catch(e) { return; }
  }

  // Synth with character: PWM-like effect using 2 detuned oscillators + filter sweep
  function playSynth(freq, startTime, dur, vol, bright) {
    if (!musicCtx || freq <= 0) return;
    var g = musicCtx.createGain();
    var flt = musicCtx.createBiquadFilter();
    flt.type = 'lowpass';
    flt.frequency.setValueAtTime(bright ? 3500 : 1800, startTime);
    flt.frequency.exponentialRampToValueAtTime(bright ? 1200 : 600, startTime + dur * 0.8);
    flt.Q.value = 4;

    // Osc 1: square, slightly sharp
    var o1 = musicCtx.createOscillator();
    o1.type = 'square'; o1.frequency.value = freq * 1.004;
    // Osc 2: sawtooth, slightly flat
    var o2 = musicCtx.createOscillator();
    o2.type = 'sawtooth'; o2.frequency.value = freq * 0.996;

    var mix = musicCtx.createGain();
    mix.gain.value = 0.5;
    o1.connect(mix); o2.connect(mix);
    mix.connect(flt); flt.connect(g); g.connect(musicGain);

    g.gain.setValueAtTime(vol || 0.08, startTime);
    g.gain.setValueAtTime(vol * 0.9, startTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
    o1.start(startTime); o1.stop(startTime + dur + 0.05);
    o2.start(startTime); o2.stop(startTime + dur + 0.05);
  }

  // Fat bass: sub sine + mid saw
  function playBass(freq, startTime, dur) {
    if (!musicCtx || freq <= 0) return;
    var g = musicCtx.createGain();
    g.gain.setValueAtTime(0.14, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);

    // Sub sine
    var sub = musicCtx.createOscillator();
    sub.type = 'sine'; sub.frequency.value = freq;
    var subG = musicCtx.createGain(); subG.gain.value = 0.7;
    sub.connect(subG); subG.connect(g);

    // Mid saw with filter
    var saw = musicCtx.createOscillator();
    saw.type = 'sawtooth'; saw.frequency.value = freq * 2;
    var flt = musicCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 400; flt.Q.value = 2;
    var sawG = musicCtx.createGain(); sawG.gain.value = 0.3;
    saw.connect(flt); flt.connect(sawG); sawG.connect(g);

    g.connect(musicGain);
    sub.start(startTime); sub.stop(startTime + dur + 0.05);
    saw.start(startTime); saw.stop(startTime + dur + 0.05);
  }

  // Arp/pad: filtered triangle for atmosphere
  function playArp(freq, startTime, dur) {
    if (!musicCtx || freq <= 0) return;
    var o = musicCtx.createOscillator();
    o.type = 'triangle'; o.frequency.value = freq;
    var g = musicCtx.createGain();
    g.gain.setValueAtTime(0.04, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
    o.connect(g); g.connect(musicGain);
    o.start(startTime); o.stop(startTime + dur + 0.05);
  }

  function playDrum(type, startTime) {
    if (!musicCtx) return;
    if (type === 'kick') {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(160, startTime);
      o.frequency.exponentialRampToValueAtTime(35, startTime + 0.15);
      g.gain.setValueAtTime(0.38, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.25);
      // Click transient
      var cl = musicCtx.createOscillator(); var cg = musicCtx.createGain();
      cl.type = 'square'; cl.frequency.value = 800;
      cg.gain.setValueAtTime(0.12, startTime);
      cg.gain.exponentialRampToValueAtTime(0.001, startTime + 0.015);
      o.connect(g); g.connect(musicGain);
      cl.connect(cg); cg.connect(musicGain);
      o.start(startTime); o.stop(startTime + 0.3);
      cl.start(startTime); cl.stop(startTime + 0.02);
    } else if (type === 'snare') {
      // Body
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(250, startTime);
      o.frequency.linearRampToValueAtTime(120, startTime + 0.06);
      g.gain.setValueAtTime(0.15, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.12);
      o.connect(g); g.connect(musicGain);
      o.start(startTime); o.stop(startTime + 0.15);
      // Noise layers
      for (var ni = 0; ni < 3; ni++) {
        var n = musicCtx.createOscillator(); var ng = musicCtx.createGain();
        n.type = 'sawtooth'; n.frequency.value = 3000 + ni * 1500 + Math.random() * 1000;
        ng.gain.setValueAtTime(0.06, startTime);
        ng.gain.exponentialRampToValueAtTime(0.001, startTime + 0.06 + ni * 0.02);
        n.connect(ng); ng.connect(musicGain);
        n.start(startTime); n.stop(startTime + 0.1 + ni * 0.02);
      }
    } else if (type === 'hat') {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'square'; o.frequency.value = 7000 + Math.random() * 3000;
      g.gain.setValueAtTime(0.035, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.035);
      o.connect(g); g.connect(musicGain);
      o.start(startTime); o.stop(startTime + 0.05);
    } else if (type === 'openhat') {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'sawtooth'; o.frequency.value = 5500;
      g.gain.setValueAtTime(0.03, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
      o.connect(g); g.connect(musicGain);
      o.start(startTime); o.stop(startTime + 0.2);
    } else if (type === 'clap') {
      for (var ci = 0; ci < 4; ci++) {
        var c = musicCtx.createOscillator(); var cg = musicCtx.createGain();
        c.type = 'sawtooth'; c.frequency.value = 2000 + Math.random() * 2000;
        cg.gain.setValueAtTime(0.05, startTime + ci * 0.01);
        cg.gain.exponentialRampToValueAtTime(0.001, startTime + ci * 0.01 + 0.06);
        c.connect(cg); cg.connect(musicGain);
        c.start(startTime + ci * 0.01); c.stop(startTime + ci * 0.01 + 0.08);
      }
    }
  }

      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(120, t);
      o.frequency.exponentialRampToValueAtTime(50, t + 0.15);
      g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o.connect(g); g.connect(musicGain); o.start(t); o.stop(t + 0.25);
    }
    function tek(t) {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'triangle'; o.frequency.setValueAtTime(800, t);
      o.frequency.exponentialRampToValueAtTime(400, t + 0.03);
      g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      var n = musicCtx.createOscillator(); var ng = musicCtx.createGain();
      n.type = 'sawtooth'; n.frequency.value = 4000 + Math.random() * 2000;
      ng.gain.setValueAtTime(0.08, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      o.connect(g); g.connect(musicGain); n.connect(ng); ng.connect(musicGain);
      o.start(t); o.stop(t + 0.1); n.start(t); n.stop(t + 0.05);
    }
    function ka(t) {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'triangle'; o.frequency.setValueAtTime(500, t);
      o.frequency.exponentialRampToValueAtTime(250, t + 0.04);
      g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      o.connect(g); g.connect(musicGain); o.start(t); o.stop(t + 0.08);
    }
    var beat = 60 / musicBPM;
    var t = startTime;
    doum(t); tek(t+beat*0.5); tek(t+beat*0.75);
    doum(t+beat); tek(t+beat*1.5); ka(t+beat*1.75);
    tek(t+beat*2); tek(t+beat*2.25); doum(t+beat*2.5);
    tek(t+beat*3); ka(t+beat*3.25); tek(t+beat*3.5); tek(t+beat*3.75);
  }

  function scheduleBar() {
    if (!musicCtx || !musicPlaying) return;
    var stepDur = 60 / musicBPM / 4; // 16th note
    var now = musicCtx.currentTime + 0.05; // small look-ahead

    for (var i = 0; i < 32; i++) {
      var t = now + i * stepDur;
      var ml = getActiveMelody();
      var idx = (musicStep + i) % ml.m.length;

      // Lead synth with character
      if (ml.m[idx] > 0) {
        playSynth(ml.m[idx], t, stepDur * 2.5, 0.07, idx % 8 < 4);
      }

      // Bass (only on non-zero)
      if (ml.b[idx] > 0) {
        playBass(ml.b[idx], t, stepDur * 3);
      }

      // Arp layer (soft shimmer)
      if (ml.a[idx] > 0 && i % 2 === 0) {
        playArp(ml.a[idx], t, stepDur * 1.5);
      }

      // Darbuka during boss fights
      if (darbukaPlaying && i % 16 === 0) {
        playDarbuka(t);
      }

      // === DRUM PATTERN (more interesting) ===
      var beat = i % 16; // within each bar of 16 16th-notes
      // Kick: 1, and-of-3, 1 (syncopated)
      if (beat === 0 || beat === 6 || beat === 10) playDrum('kick', t);
      // Snare: 4, 12 (2 and 4)
      if (beat === 4 || beat === 12) playDrum('snare', t);
      // Clap layered on beat 12 every other bar
      if (beat === 12 && i >= 16) playDrum('clap', t);
      // Hats: running 8ths with some 16th ghost notes
      if (beat % 2 === 0) playDrum('hat', t);
      if ((beat === 3 || beat === 7 || beat === 11 || beat === 15) && Math.random() > 0.3)
        playDrum('hat', t);
      // Open hat on the "and" of 2
      if (beat === 5) playDrum('openhat', t);
    }

    musicStep = (musicStep + 32) % getActiveMelody().m.length;
  }

  function startMusic() {
    ensureAudioReady();
    initMusic();
    if (!musicCtx) return;
    if (musicCtx.state === 'suspended') musicCtx.resume();
    musicPlaying = true;
    musicStep = 0;
    scheduleBar();
    var barDur = (60 / musicBPM / 4) * 32 * 1000; // 2 bars worth
    musicInterval = setInterval(function() {
      if (musicPlaying) scheduleBar();
    }, barDur - 80);
  }

  function stopMusic() {
    musicPlaying = false;
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  }

  // ===== SOUND EFFECTS ENGINE =====
  var sfxCtx = null;

  function initSfx() {
    if (sfxCtx) return;
    try {
      sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }

  function ensureAudioReady() {
    initSfx();
    if (sfxCtx && sfxCtx.state === 'suspended') sfxCtx.resume();
    if (musicCtx && musicCtx.state === 'suspended') musicCtx.resume();
  }

  // Enemy hit - quick zap
  function playSfxHit() {
    if (!sfxCtx) initSfx();
    if (!sfxCtx) return;
    if (sfxCtx.state === 'suspended') sfxCtx.resume();
    var t = sfxCtx.currentTime;
    var o = sfxCtx.createOscillator();
    var g = sfxCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(800, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.08);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g); g.connect(sfxCtx.destination);
    o.start(t); o.stop(t + 0.1);
  }

  // Boss death - Khamenei crying/wailing descending tone
  function playSfxBossDeath() {
    if (!sfxCtx) initSfx();
    if (!sfxCtx) return;
    if (sfxCtx.state === 'suspended') sfxCtx.resume();
    var t = sfxCtx.currentTime;
    // Wailing cry - vibrato descending
    for (var i = 0; i < 3; i++) {
      var o = sfxCtx.createOscillator();
      var g = sfxCtx.createGain();
      var lfo = sfxCtx.createOscillator();
      var lfoG = sfxCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(600 - i * 100, t + i * 0.4);
      o.frequency.exponentialRampToValueAtTime(120, t + i * 0.4 + 0.35);
      lfo.type = 'sine';
      lfo.frequency.value = 12 + i * 4;
      lfoG.gain.value = 40;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      g.gain.setValueAtTime(0.2, t + i * 0.4);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.4 + 0.38);
      o.connect(g); g.connect(sfxCtx.destination);
      o.start(t + i * 0.4); o.stop(t + i * 0.4 + 0.4);
      lfo.start(t + i * 0.4); lfo.stop(t + i * 0.4 + 0.4);
    }
    // Big boom at end
    var n = sfxCtx.createOscillator();
    var ng = sfxCtx.createGain();
    n.type = 'sine';
    n.frequency.setValueAtTime(80, t + 1.2);
    n.frequency.exponentialRampToValueAtTime(20, t + 1.8);
    ng.gain.setValueAtTime(0.3, t + 1.2);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
    n.connect(ng); ng.connect(sfxCtx.destination);
    n.start(t + 1.2); n.stop(t + 1.8);
  }

  // Wave start fanfare - triumphant ascending notes
  function playSfxWaveStart() {
    if (!sfxCtx) initSfx();
    if (!sfxCtx) return;
    if (sfxCtx.state === 'suspended') sfxCtx.resume();
    var t = sfxCtx.currentTime;
    var notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
    for (var i = 0; i < notes.length; i++) {
      var o = sfxCtx.createOscillator();
      var g = sfxCtx.createGain();
      o.type = 'square';
      o.frequency.value = notes[i];
      var start = t + i * 0.12;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.15, start + 0.02);
      g.gain.setValueAtTime(0.15, start + 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, start + (i === 3 ? 0.5 : 0.15));
      o.connect(g); g.connect(sfxCtx.destination);
      o.start(start); o.stop(start + (i === 3 ? 0.5 : 0.15));
    }
  }

  // Countdown beep - descending pitch: 3=high, 2=mid, 1=low, GO=fanfare
  function playSfxBeep(num) {
    if (!sfxCtx) initSfx();
    if (!sfxCtx) return;
    if (sfxCtx.state === 'suspended') sfxCtx.resume();
    var t = sfxCtx.currentTime;
    if (num > 0) {
      // Beep tone - higher for higher numbers
      var freq = num === 3 ? 880 : (num === 2 ? 660 : 440);
      var o = sfxCtx.createOscillator();
      var g = sfxCtx.createGain();
      o.type = 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.2, t);
      g.gain.setValueAtTime(0.2, t + 0.15);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.connect(g); g.connect(sfxCtx.destination);
      o.start(t); o.stop(t + 0.4);
    } else {
      // GO! - quick ascending fanfare
      var goNotes = [523, 784, 1047];
      for (var i = 0; i < goNotes.length; i++) {
        var o2 = sfxCtx.createOscillator();
        var g2 = sfxCtx.createGain();
        o2.type = 'square';
        o2.frequency.value = goNotes[i];
        var s = t + i * 0.06;
        g2.gain.setValueAtTime(0.18, s);
        g2.gain.exponentialRampToValueAtTime(0.001, s + 0.3);
        o2.connect(g2); g2.connect(sfxCtx.destination);
        o2.start(s); o2.stop(s + 0.3);
      }
    }
  }

  // Enemy kill explosion sound
  function playSfxKill() {
    if (!sfxCtx) initSfx();
    if (!sfxCtx) return;
    if (sfxCtx.state === 'suspended') sfxCtx.resume();
    var t = sfxCtx.currentTime;
    // Quick noise burst + sine drop
    var o = sfxCtx.createOscillator();
    var g = sfxCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.15);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g); g.connect(sfxCtx.destination);
    o.start(t); o.stop(t + 0.15);
  }

  // Unlock audio on first user interaction (critical for mobile!)
  document.addEventListener('touchstart', ensureAudioReady, { once: true, passive: true });
  document.addEventListener('click', ensureAudioReady, { once: true });

  function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('citySelectScreen').classList.add('hidden');
    document.getElementById('countdownScreen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('rankDisplay').style.display = 'flex';
    if (isMobile) document.getElementById('mobileControls').style.display = 'flex';

    score = 0; lives = 5; wave = 1;
    playerHP = 5; maxPlayerHP = 5;
    totalKills = 0; killsSinceLastStealth = 0;
    stealthReady = false; stealthActive = false; stealthPlane = null;
    lastExtraLife = 0;
    fireRateMultiplier = 1; shotStreams = 1; ammoType = 0; activeAmmos = []; powerUpTimer = 0;
    trumpTimer = 0;
    pBullets = []; enemies = []; eBullets = [];
    particles = []; floats = []; powerUps = [];
    guaranteedPowerUpTimer = 0; hasMagnet = false; magnetTimer = 0; bgScroll = 0;
    comboCount = 0; comboTimer = 0;
    boss = null;
    zapperDisableTimer = 0;
    miniBoss = null;
    miniBosses = [];
    activeAmmos = [];
    PSPEED = isMobile ? 6 : 4.5; // Reset speed
    px = W / 2;
    py = H - (isMobile ? 90 : 80);
    pInvincible = 0;
    currentRankIdx = 0;

    // Defender-specific bonuses
    if (selectedDefender === 'golda') {
      maxPlayerHP = 7; playerHP = 7; // Extra armor
    }
    if (selectedDefender === 'idan') {
      fireRateMultiplier = 1.5; // Faster shooting
    }
    if (selectedDefender === 'lionphoto') {
      activeAmmos = [1]; // Starts with explosive ammo
    }
    if (selectedDefender === 'hassan') {
      hasMagnet = true; magnetTimer = 999999; // Permanent magnet
    }
    if (selectedDefender === 'crambo') {
      // "You start at your fastest pace and gradually you increase"
      PSPEED = isMobile ? 10 : 7.5;
    }
    if (selectedDefender === 'penina') {
      // Beauty queen - shield from start + extra lives
      pInvincible = 8; lives = 5;
    }

    updateHUD();
    updateStealthBtn();
    gameState = WAVE_INTRO;
    waveTimer = 2.0;
    currentMelodySet = 0; darbukaPlaying = false;
    startMusic();
  }

  // ===== MAIN RENDER LOOP =====
  var prevTime = 0;

  function frame(ts) {
    var dt = Math.min((ts - prevTime) / 1000, 0.05);
    prevTime = ts;

    update(dt);

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBG();

    if (gameState === PLAYING || gameState === WAVE_INTRO || gameState === BOSS_INTRO) {
      for (var i = 0; i < enemies.length; i++) drawEnemy(enemies[i]);
      drawBoss();
      drawMiniBosses();
      for (var i = 0; i < eBullets.length; i++) drawEBullet(eBullets[i]);
      for (var i = 0; i < pBullets.length; i++) drawPBullet(pBullets[i]);
      drawPowerUps();
      drawStealthPlane();
      drawPlayer();
      drawStealthIndicator();
      drawPowerUpIndicator();

      // Flashing prompt when F-35 ready
      if (stealthReady) {
        ctx.save();
        var pulse = 0.5 + Math.sin(performance.now() / 200) * 0.5;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ff3300';
        ctx.font = '900 ' + (isMobile ? '22' : '28') + 'px ' + FONT_TITLE;
        ctx.textAlign = 'center';
        if (isMobile) {
          ctx.fillText('🇺🇸 BOMBER AVAILABLE! 🇺🇸', W/2, H * 0.15);
        } else {
          ctx.fillText('🇺🇸 PRESS S - F-35 STEALTH BOMBER! 🇺🇸', W/2, H * 0.18);
        }
        ctx.restore();
      }

      if (comboCount > 1 && comboTimer > 0) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, comboTimer);
        ctx.fillStyle = comboCount > 4 ? '#fbbf24' : '#60a5fa';
        var fs = Math.min(36, 20 + comboCount * 3);
        ctx.font = '900 ' + fs + 'px ' + FONT_TITLE;
        ctx.textAlign = 'center';
        ctx.fillText('COMBO x' + comboCount + '!', W/2, H * 0.35);
        ctx.restore();
      }
    }

    if (gameState === WAVE_INTRO) {
      var a = waveTimer < 0.5 ? waveTimer*2 : (waveTimer > 1.5 ? (2-waveTimer)*2 : 1);
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, a));

      if (wave % 3 === 0) {
        ctx.fillStyle = '#ff4444';
        ctx.font = '900 38px ' + FONT_TITLE;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⚠ BOSS WAVE ' + wave + ' ⚠', W/2, H/2 - 22);
        ctx.fillStyle = '#fbbf24';
        ctx.font = '700 20px ' + FONT_HEB;
        ctx.fillText('!האייתולה מתקרב', W/2, H/2 + 22);
      } else {
        ctx.fillStyle = '#60a5fa';
        ctx.font = '900 42px ' + FONT_TITLE;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('WAVE ' + wave, W/2, H/2 - 22);
        ctx.fillStyle = '#fbbf24';
        ctx.font = '700 22px ' + FONT_HEB;
        ctx.fillText('!הכן שאגת הארי', W/2, H/2 + 22);
      }
      ctx.restore();
    }

    drawTrump();
    drawParticles();
    drawFloats();
    ctx.restore();

    requestAnimationFrame(frame);
  }

  // ===== INPUT HANDLING =====
  document.addEventListener('keydown', function(e) {
    if (e.code === 'KeyS' && !e.repeat) {
      keys['KeyS'] = true;
    } else if (e.code === 'ArrowDown' || e.code === 'KeyW' || e.code === 'ArrowUp') {
      keys[e.code] = true;
    } else {
      keys[e.code] = true;
    }
    if (e.code === 'Space') e.preventDefault();
    if (gameState === GAMEOVER && gameOverReady && (e.code === 'Space' || e.code === 'Enter')) {
      gameOverReady = false;
      restartWithCountdown();
    }
  });
  document.addEventListener('keyup', function(e) { keys[e.code] = false; });

  // Mobile controls
  // Improved multi-touch: track each pointer independently
  var _activePointers = {};
  function bindTouch(id, key) {
    var el = document.getElementById(id);
    if (!el) return;
    el.style.touchAction = 'none';

    el.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      e.stopPropagation();
      el.setPointerCapture(e.pointerId);
      _activePointers[e.pointerId] = key;
      if (key === 'stealth') { activateStealth(); return; }
      keys[key] = true;
      el.classList.add('active');
    }, { passive: false });

    el.addEventListener('pointerup', function(e) {
      e.preventDefault();
      e.stopPropagation();
      delete _activePointers[e.pointerId];
      if (key === 'stealth') return;
      keys[key] = false;
      el.classList.remove('active');
    }, { passive: false });

    el.addEventListener('pointercancel', function(e) {
      delete _activePointers[e.pointerId];
      if (key !== 'stealth') { keys[key] = false; el.classList.remove('active'); }
    }, { passive: false });

    el.addEventListener('pointermove', function(e) {
      e.preventDefault();
      if (key === 'stealth') return;
      var rect = el.getBoundingClientRect();
      if (e.clientX < rect.left - 40 || e.clientX > rect.right + 40 ||
          e.clientY < rect.top - 40 || e.clientY > rect.bottom + 40) {
        delete _activePointers[e.pointerId];
        keys[key] = false;
        el.classList.remove('active');
      }
    }, { passive: false });
  }

  bindTouch('btnLeft', 'mLeft');
  bindTouch('btnRight', 'mRight');
  bindTouch('btnUp', 'mUp');
  bindTouch('btnDown', 'mDown');
  bindTouch('btnFire', 'mFire');
  bindTouch('btnStealth', 'stealth');

  document.addEventListener('touchend', function(e) {
    if (gameState === PLAYING || gameState === WAVE_INTRO) {
      var now = Date.now();
      if (now - (document._lastTap || 0) < 300) e.preventDefault();
      document._lastTap = now;
    }
  }, { passive: false });

  requestAnimationFrame(frame);

})();
</script>
