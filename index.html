<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>שאגת הארי - Lion's Roar Defense</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0a1a;
    overflow: hidden;
    font-family: Arial, sans-serif;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
    position: fixed;
    top: 0; left: 0;
  }

  canvas {
    display: block;
    width: 100%; height: 100%;
    position: fixed;
    top: 0; left: 0;
    touch-action: none;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: radial-gradient(ellipse at center, #0d1b3e 0%, #050a15 70%);
    padding: 20px;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  .overlay.hidden { display: none !important; }

  .title {
    font-family: 'Courier New', monospace;
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, #60a5fa 50%, #fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 700;
    color: #fff;
    margin-bottom: 1rem;
    text-align: center;
  }

  .hebrew-title {
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 900;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .motto {
    color: #fbbf24;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    margin-top: 0.5rem;
    text-align: center;
  }

  .flag-icon {
    width: 100px; height: 68px;
    margin: 0.8rem auto;
    position: relative;
    border: 2px solid rgba(96,165,250,0.3);
    overflow: hidden;
  }
  .flag-bg { background: #fff; width: 100%; height: 100%; }
  .flag-stripe-top, .flag-stripe-bottom {
    position: absolute; left: 0; right: 0; height: 14px; background: #0038b8;
  }
  .flag-stripe-top { top: 7px; }
  .flag-stripe-bottom { bottom: 7px; }
  .star-david-css {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 20px solid #0038b8;
  }
  .star-david-css::after {
    content: ''; position: absolute;
    top: 7px; left: -12px;
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 20px solid #0038b8;
  }

  .countdown-num {
    font-family: 'Courier New', monospace;
    font-size: clamp(5rem, 25vw, 10rem);
    font-weight: 900;
    color: #60a5fa;
    text-align: center;
    text-shadow: 0 0 40px rgba(96,165,250,0.6);
    animation: countPulse 0.9s ease-out;
  }
  .countdown-num.c2 { color: #fbbf24; text-shadow: 0 0 40px rgba(251,191,36,0.6); }
  .countdown-num.c1 { color: #ef4444; text-shadow: 0 0 40px rgba(239,68,68,0.6); }
  .countdown-num.go { color: #22c55e; text-shadow: 0 0 40px rgba(34,197,94,0.6); font-size: clamp(4rem, 20vw, 8rem); }

  @keyframes countPulse {
    0% { transform: scale(1.5); opacity: 0; }
    30% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.8; }
  }

  .countdown-sub {
    color: #8899bb;
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    margin-top: 1rem;
  }

  .instructions {
    color: #8899bb;
    margin-top: 1.5rem;
    text-align: center;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    line-height: 2;
  }
  .instructions span { color: #60a5fa; font-weight: 700; }

  .gameover-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(5,10,21,0.88);
    padding: 20px;
    cursor: pointer;
  }
  .gameover-overlay.hidden { display: none !important; }

  .score-display {
    font-family: 'Courier New', monospace;
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    color: #60a5fa;
    margin: 1rem 0;
  }

  .tap-hint {
    color: #60a5fa;
    font-family: 'Courier New', monospace;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    font-weight: 700;
    margin-top: 2rem;
    animation: blinker 1.2s ease-in-out infinite;
  }
  @keyframes blinker {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding-top: env(safe-area-inset-top, 0px);
    height: calc(46px + env(safe-area-inset-top, 0px));
    display: none;
    align-items: center;
    justify-content: space-between;
    padding-left: max(8px, env(safe-area-inset-left, 0px));
    padding-right: max(8px, env(safe-area-inset-right, 0px));
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
    z-index: 50;
    font-family: 'Courier New', monospace;
    font-size: clamp(0.55rem, 1.8vw, 0.85rem);
  }
  .hud-item { color: #fff; display: flex; align-items: center; gap: 4px; }
  .hud-value { color: #60a5fa; font-weight: 700; }
  .hud-lives { display: flex; gap: 2px; font-size: 0.85rem; }

  /* ===== NEW MOBILE CONTROLS: dual-thumb layout ===== */
  #mobileControls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 60;
    display: none;
    direction: ltr; /* Force LTR: fire on LEFT, d-pad on RIGHT */
    justify-content: space-between;
    align-items: flex-end;
    padding: 10px 14px;
    padding-bottom: max(15px, env(safe-area-inset-bottom, 10px));
    background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    touch-action: none;
    pointer-events: none;
  }

  /* Left side: Fire + F-35 (stacked) */
  .controls-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: auto;
  }

  /* Right side: D-pad */
  .controls-right {
    display: grid;
    direction: ltr; /* Force LTR so grid isn't flipped by RTL page */
    grid-template-areas:
      ".    up   ."
      "left .    right"
      ".    down .";
    grid-template-columns: 64px 64px 64px;
    grid-template-rows: 64px 64px 64px;
    gap: 5px;
    pointer-events: auto;
  }

  .mobile-btn {
    width: 64px; height: 64px;
    border: 2px solid rgba(96,165,250,0.6);
    background: rgba(96,165,250,0.15);
    border-radius: 50%;
    color: #fff; font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }
  .mobile-btn.active, .mobile-btn:active {
    background: rgba(96,165,250,0.45);
    border-color: #60a5fa;
    transform: scale(0.93);
  }
  .fire-btn {
    width: 90px; height: 90px;
    border-color: #ef4444;
    background: rgba(239,68,68,0.18);
    font-size: 0.7rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    border-radius: 50%;
  }
  .fire-btn.active, .fire-btn:active {
    background: rgba(239,68,68,0.5);
    border-color: #ff6b6b;
    transform: scale(0.93);
  }
  .stealth-btn {
    width: 62px; height: 62px;
    border-color: #555;
    background: rgba(80,80,80,0.3);
    font-size: 0.5rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: #888;
    transition: all 0.3s ease;
  }
  .stealth-btn.ready {
    width: 72px; height: 72px;
    border: 3px solid #ff0000;
    background: rgba(255,0,0,0.35);
    color: #fff;
    font-size: 0.65rem;
    animation: f35pulse 0.6s ease-in-out infinite;
    box-shadow: 0 0 15px rgba(255,0,0,0.6), 0 0 30px rgba(255,0,0,0.3), inset 0 0 10px rgba(255,0,0,0.2);
  }
  @keyframes f35pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255,0,0,0.6), 0 0 30px rgba(255,0,0,0.3); border-color: #ff0000; }
    50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(255,50,0,0.9), 0 0 50px rgba(255,0,0,0.5); border-color: #ff4400; }
  }
  .stealth-btn.active, .stealth-btn:active {
    background: rgba(255,0,0,0.7);
    border-color: #ff0000;
    transform: scale(0.9);
    box-shadow: 0 0 20px rgba(255,0,0,0.8);
  }

  #btnUp { grid-area: up; }
  #btnDown { grid-area: down; }
  #btnLeft { grid-area: left; }
  #btnRight { grid-area: right; }

  @media (pointer: coarse), (max-width: 900px) {
    #mobileControls { display: flex; }
  }
  @media (pointer: fine) and (min-width: 901px) {
    #mobileControls { display: none !important; }
  }

  .char-card {
    background: rgba(30,40,80,0.7);
    border: 2px solid rgba(96,165,250,0.3);
    border-radius: 12px;
    padding: 10px 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    touch-action: manipulation;
  }
  .char-card:hover, .char-card.selected {
    border-color: #60a5fa;
    background: rgba(40,60,120,0.8);
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(96,165,250,0.4);
  }
  .char-card img {
    width: 64px; height: 64px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.3);
    display: block;
    margin: 0 auto 6px;
  }
  .char-card .char-label {
    color: #fff;
    font-size: 0.65rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
  }
  .char-card canvas {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: block;
    margin: 0 auto 6px;
  }
  .char-start-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 12px 40px;
    background: linear-gradient(135deg, #0038b8, #0050d0);
    color: #fff;
    border: 2px solid #60a5fa;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-weight: 900;
    font-size: clamp(0.9rem,3vw,1.1rem);
    cursor: pointer;
    touch-action: manipulation;
    transition: all 0.2s;
  }
  .char-start-btn:hover { background: #0050d0; transform: scale(1.05); }
</style>
</head>
<body>

<div class="overlay" id="startScreen">
  <div class="hebrew-title">🇮🇱 שאגת הארי 🇮🇱</div>
  <div class="title">LION'S ROAR</div>
  <div class="subtitle">IRON DOME DEFENSE</div>
  <div class="motto">עם ישראל חי! 💪</div>
  <div class="flag-icon">
    <div class="flag-bg"></div>
    <div class="flag-stripe-top"></div>
    <div class="flag-stripe-bottom"></div>
    <div class="star-david-css"></div>
  </div>
  <div class="instructions">
    <span id="instrText"></span>
  </div>
</div>

<div class="overlay hidden" id="charSelectScreen" style="overflow-y:auto;padding:20px 10px;">
  <div class="hebrew-title" style="font-size:clamp(1.2rem,4vw,1.8rem)">🦁 בחר את הלוחם שלך 🦁</div>
  <div class="title" style="font-size:clamp(1rem,3vw,1.5rem)">CHOOSE YOUR DEFENDER</div>
  <div id="charGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;max-width:600px;margin:15px auto;direction:ltr;"></div>
  <div id="charName" style="color:#60a5fa;font-size:clamp(1rem,3vw,1.3rem);font-weight:900;margin:8px 0;font-family:'Courier New',monospace;"></div>
  <div id="charDesc" style="color:#aaa;font-size:clamp(0.7rem,2vw,0.85rem);font-family:Arial,sans-serif;max-width:400px;margin:0 auto;"></div>
  <div id="highScoreDisplay" style="margin:12px auto;max-width:400px;color:#fbbf24;font-family:'Courier New',monospace;font-size:clamp(0.65rem,1.8vw,0.8rem);text-align:center;"></div>
</div>

<div class="overlay hidden" id="countdownScreen">
  <div class="countdown-num" id="countdownNum">3</div>
  <div class="countdown-sub">הכן שאגת הארי...</div>
</div>

<div class="gameover-overlay hidden" id="gameOverScreen">
  <div class="hebrew-title">המשימה הסתיימה</div>
  <div class="title" style="font-size:clamp(1.8rem,6vw,2.5rem)">MISSION COMPLETE</div>
  <div class="score-display" id="finalScore">0</div>
  <div class="subtitle" id="finalWave" style="font-size:clamp(1rem,3vw,1.2rem)">גל 1</div>
  <div class="motto" id="endMessage">עם ישראל חי!</div>
  <div id="goHighScore" style="color:#fbbf24;font-family:'Courier New',monospace;font-size:clamp(0.8rem,2.5vw,1rem);margin:8px 0;"></div>
  <div class="tap-hint" id="tapHint" style="display:none">TAP TO PLAY AGAIN<br><span style="font-family:Arial,sans-serif;font-size:0.85em">לחץ כדי לשחק שוב</span></div>
</div>

<div id="hud">
  <div class="hud-item"><span>SCORE</span><span class="hud-value" id="hudScore">0</span></div>
  <div class="hud-item"><span>WAVE</span><span class="hud-value" id="hudWave">1</span></div>
  <div class="hud-item"><span>HP</span><span class="hud-value" id="hudHP">3</span></div>
  <div class="hud-item"><span>LIVES</span><div class="hud-lives" id="hudLives"></div></div>
  <div class="hud-item"><span>KILLS</span><span class="hud-value" id="hudKills">0</span></div>
  <div class="hud-item"><span>RANK</span><span class="hud-value" id="hudRank">טוראי</span></div>
</div>

<!-- NEW LAYOUT: Fire on LEFT, D-pad on RIGHT -->
<div id="mobileControls">
  <div class="controls-left">
    <button class="mobile-btn fire-btn" id="btnFire" type="button">FIRE<br>🔥</button>
    <button class="mobile-btn stealth-btn" id="btnStealth" type="button">F-35</button>
  </div>
  <div class="controls-right">
    <button class="mobile-btn" id="btnUp" type="button">▲</button>
    <button class="mobile-btn" id="btnLeft" type="button">◀</button>
    <button class="mobile-btn" id="btnRight" type="button">▶</button>
    <button class="mobile-btn" id="btnDown" type="button">▼</button>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
(function() {
  "use strict";

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0;
  var dpr = window.devicePixelRatio || 1;

  // Mobile zoom out: scale the game world to show more area
  var mobileScale = 1;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    // On mobile, zoom out to show more game area
    if (isMobile) {
      mobileScale = 0.62;
      W = Math.round(W / mobileScale);
      H = Math.round(H / mobileScale);
    }
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = (W * mobileScale) + 'px';
    canvas.style.height = (H * mobileScale) + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function() {
    setTimeout(resize, 100);
    setTimeout(resize, 300);
  });

  canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
  var mcEl = document.getElementById('mobileControls');
  if (mcEl) mcEl.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

  // ===== CONSTANTS =====
  var MENU = 0, PLAYING = 1, WAVE_INTRO = 2, GAMEOVER = 3, BOSS_INTRO = 4;
  var PW = 60, PH = 52, PSPEED = isMobile ? 6 : 4.5;
  var BASE_SHOT_CD = 200;
  var FONT_TITLE = "'Courier New', monospace";
  var FONT_HEB = "Arial, sans-serif";

  // ===== STATE =====
  var gameState = MENU;
  var score = 0, lives = 3, wave = 1;
  var playerHP = 3, maxPlayerHP = 3;
  var totalKills = 0;
  var killsSinceLastStealth = 0;
  var stealthReady = false;
  var stealthActive = false;
  var stealthPlane = null;
  var waveTimer = 0;
  var shakeX = 0, shakeY = 0, shakeDur = 0;
  var comboCount = 0, comboTimer = 0;
  var lastExtraLife = 0;

  // Power-ups
  var fireRateMultiplier = 1;
  var shotStreams = 1;
  var ammoType = 0;
  var ammoNames = ['NORMAL', 'EXPLOSIVE', 'PIERCING', 'ELECTRIC'];
  var ammoColors = ['#60a5fa', '#ff8844', '#22ff88', '#aa66ff'];
  var powerUpTimer = 0;

  var powerUps = [];
  var trumpTimer = 0;

  var pBullets = [];
  var enemies = [];
  var eBullets = [];
  var particles = [];
  var floats = [];

  var px = 0, py = 0;
  var pInvincible = 0;
  var lastShot = 0;

  var eDirX = 1, eSpeed = 0.6;

  // Boss
  var boss = null;
  var bossIntroTimer = 0;

  // === PRELOAD REAL PHOTOS ===
  var khameneiImg = new Image();
  khameneiImg.crossOrigin = 'anonymous';
  khameneiImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Ali_Khamenei_2024_%283x4_cropped%29.jpg/200px-Ali_Khamenei_2024_%283x4_cropped%29.jpg';
  var khameneiLoaded = false;
  khameneiImg.onload = function() { khameneiLoaded = true; };

  var trumpImg = new Image();
  trumpImg.crossOrigin = 'anonymous';
  trumpImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/January_2025_Official_Presidential_Portrait_of_Donald_J._Trump.jpg/200px-January_2025_Official_Presidential_Portrait_of_Donald_J._Trump.jpg';
  var trumpLoaded = false;
  trumpImg.onload = function() { trumpLoaded = true; };

  // === NEW BOSS PHOTOS ===
  var sinwarImg = new Image();
  sinwarImg.crossOrigin = 'anonymous';
  sinwarImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Yahya_al-Sinwar_2011_crop.JPG/200px-Yahya_al-Sinwar_2011_crop.JPG';
  var sinwarLoaded = false;
  sinwarImg.onload = function() { sinwarLoaded = true; };

  var nasrallahImg = new Image();
  nasrallahImg.crossOrigin = 'anonymous';
  nasrallahImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Portrait_of_Hassan_Nasrallah.jpg/200px-Portrait_of_Hassan_Nasrallah.jpg';
  var nasrallahLoaded = false;
  nasrallahImg.onload = function() { nasrallahLoaded = true; };

  var ahmadinejadImg = new Image();
  ahmadinejadImg.crossOrigin = 'anonymous';
  ahmadinejadImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Mahmoud_Ahmadinejad_crop.jpg/200px-Mahmoud_Ahmadinejad_crop.jpg';
  var ahmadinejadLoaded = false;
  ahmadinejadImg.onload = function() { ahmadinejadLoaded = true; };

  // === DEFENDER PHOTOS ===
  var goldaImg = new Image();
  goldaImg.crossOrigin = 'anonymous';
  goldaImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Golda_Meir_%281964%29.jpg/200px-Golda_Meir_%281964%29.jpg';
  var goldaLoaded = false;
  goldaImg.onload = function() { goldaLoaded = true; };

  var benGurionImg = new Image();
  benGurionImg.crossOrigin = 'anonymous';
  benGurionImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Ben_Gurion_1959.jpg/200px-Ben_Gurion_1959.jpg';
  var benGurionLoaded = false;
  benGurionImg.onload = function() { benGurionLoaded = true; };

  var idanImg = new Image();
  idanImg.crossOrigin = 'anonymous';
  idanImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/%D7%A2%D7%99%D7%93%D7%9F_%D7%A2%D7%9E%D7%93%D7%99.jpg/200px-%D7%A2%D7%99%D7%93%D7%9F_%D7%A2%D7%9E%D7%93%D7%99.jpg';
  var idanLoaded = false;
  idanImg.onload = function() { idanLoaded = true; };

  var lionPhotoImg = new Image();
  lionPhotoImg.crossOrigin = 'anonymous';
  lionPhotoImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Hear_me_roar_%28Unsplash%29.jpg/200px-Hear_me_roar_%28Unsplash%29.jpg';
  var lionPhotoLoaded = false;
  lionPhotoImg.onload = function() { lionPhotoLoaded = true; };



  // ===== DEFENDER SYSTEM =====

  // ===== SPAWN WAVE =====
  function spawnWave() {
    enemies = [];
    var rows = Math.min(2 + Math.floor(wave * 0.6), 5);
    var cols = Math.min(4 + wave, 10);
    var spX = Math.min(55, (W - 60) / cols);
    var totW = (cols - 1) * spX;
    var sx = (W - totW) / 2;
    var sy = 65;
    var hpBonus = Math.floor(wave / 3);

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var baseHp = r === 0 ? 2 : 1;
        var isSplitter = (wave >= 20 && r === 0 && Math.random() < 0.35);
        var isKamikaze = (wave >= 30 && r > 0 && Math.random() < 0.2);
        enemies.push({
          x: sx + c * spX,
          y: sy + r * 46,
          size: isSplitter ? 22 : 18,
          hp: (baseHp + hpBonus) * (isSplitter ? 2 : 1),
          maxHp: (baseHp + hpBonus) * (isSplitter ? 2 : 1),
          flash: 0,
          shootCD: 2000 + Math.random() * 4000,
          splitter: isSplitter,
          kamikaze: isKamikaze,
          kamikazeActive: false
        });
      }
    }
    eDirX = 1;
    eSpeed = 0.4 + wave * 0.12;
    eBullets = [];
  }

  // ===== SPAWN BOSS =====
  function spawnBoss() {
    var bossNum = Math.floor(wave / 3);
    var col = bossColors[(bossNum - 1) % bossColors.length];

    // Exponential scaling for waves 9+
    var baseHP, extraHP, bossSize, label;
    if (wave >= 12) {
      // NIGHTMARE tier: massive HP, bigger, furious
      baseHP = 80;
      extraHP = (bossNum - 1) * 25;
      bossSize = 65;
      label = '💀 ' + bossCharacters[(bossNum-1) % bossCharacters.length].nameHe + ' #' + bossNum + ' 💀';
    } else if (wave >= 9) {
      // RAGE tier: very tough
      baseHP = 55;
      extraHP = (bossNum - 1) * 18;
      bossSize = 58;
      label = '🔥 ' + bossCharacters[(bossNum-1) % bossCharacters.length].nameHe + ' #' + bossNum + ' 🔥';
    } else {
      baseHP = 30;
      extraHP = (bossNum - 1) * 10;
      bossSize = 50;
      label = bossCharacters[(bossNum-1) % bossCharacters.length].nameHe + ' #' + bossNum;
    }

    boss = {

  // ===== DRAW FUNCTIONS =====
  function drawBG() {
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#030810');
    grad.addColorStop(0.7, '#0a1628');
    grad.addColorStop(1, '#0d1b35');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    var now = performance.now() / 1000;
    for (var i = 0; i < bgStars.length; i++) {
      var s = bgStars[i];
      ctx.globalAlpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(now * s.sp + s.ph));
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H * 0.75, s.sz, 0, 6.28);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#080f20';
    ctx.fillRect(0, H - 35, W, 35);
    for (var i = 0; i < bldgs.length; i++) {
      var b = bldgs[i];
      if (b.x > W + 30) continue;
      ctx.fillStyle = '#0b1530';
      ctx.fillRect(b.x, H - 35 - b.h, b.w, b.h);
    }
  }

  function drawStar6(cx, cy, sz) {
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.moveTo(cx, cy - sz);
    ctx.lineTo(cx + sz * 0.866, cy + sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy + sz * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx, cy + sz);
    ctx.lineTo(cx + sz * 0.866, cy - sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy - sz * 0.5);
    ctx.closePath();
    ctx.fill();
  }

  function drawPhotoDefender(defInfo) {
    var x = px, y = py;
    var s = 1;
    // Platform / vehicle
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.ellipse(x, y + 10*s, 28*s, 12*s, 0, 0, 6.28);
    ctx.fill();
    // Blue-white stripes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 26*s, y + 4*s, 52*s, 3*s);
    ctx.fillRect(x - 26*s, y + 14*s, 52*s, 3*s);
    // Star of David on platform
    drawStarOfDavid(x, y + 10*s, 6, '#ffffff');
    // Photo circle
    if (defInfo.img && defInfo.img.complete && defInfo.img.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y - 12*s, 18*s, 0, 6.28);
      ctx.clip();
      ctx.drawImage(defInfo.img, x - 18*s, y - 30*s, 36*s, 36*s);
      ctx.restore();
    }
    // Border around photo
    ctx.strokeStyle = '#60a5fa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y - 12*s, 18*s, 0, 6.28);
    ctx.stroke();
    // Glow
    ctx.shadowColor = '#0038b8';
    ctx.shadowBlur = 12;
    ctx.strokeStyle = '#0050d0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y - 12*s, 20*s, 0, 6.28);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Name label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px Arial, sans-serif';
    ctx.textAlign = 'center';
    var def = defenders.find(function(d) { return d.id === selectedDefender; });
    if (def) ctx.fillText(def.name, x, y + 26*s);
    // Rank badge
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 7px Arial, sans-serif';
    ctx.fillText(getCurrentRank().name, x, y - 34*s);
  }

  function drawPlayer() {
    ctx.save();
    if (pInvincible > 0 && Math.floor(performance.now() / 80) % 2 === 0) {
      ctx.globalAlpha = 0.3;
    }
    // Photo-based defenders
    var defInfo = getDefenderImg(selectedDefender);
    if (defInfo && selectedDefender !== 'lion') {
      drawPhotoDefender(defInfo);
      ctx.restore();
      return;
    }

    // Shield glow when invincible
    if (shieldTimer > 0) {
      var sg = ctx.createRadialGradient(px, py, 10, px, py, 42);
      sg.addColorStop(0, 'rgba(68,221,255,0.0)');
      sg.addColorStop(0.6, 'rgba(68,221,255,0.2)');
      sg.addColorStop(1, 'rgba(68,221,255,0.0)');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(px, py, 42, 0, 6.28); ctx.fill();
    }

    // === LION (Blue-White Israeli uniform) ===
    var s = 1.0;

    // === Body - white with blue vest ===
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(px, py + 4*s, 18*s, 22*s, 0, 0, 6.28);
    ctx.fill();
    // Blue vest/armor overlay
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.ellipse(px, py + 2*s, 16*s, 18*s, 0, 0, 6.28);
    ctx.fill();
    // White stripe down center of vest
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(px - 3*s, py - 14*s, 6*s, 28*s);
    // Star of David on chest
    drawStar6(px, py - 2*s, 6*s);

    // === נילי on the back (below star) ===
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold ' + Math.round(9*s) + 'px ' + FONT_HEB;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('נילי', px, py + 12*s);

    // === Mane - blue and white tufts ===
    var maneY = py - 16*s;
    var mClrs = ['#0038b8', '#ffffff', '#0050d0', '#e0e8ff'];
    for (var mi = 0; mi < 14; mi++) {
      var ma = (mi / 14) * 6.28 + Math.sin(performance.now()/300 + mi) * 0.12;
      var mr = 16*s + Math.sin(performance.now()/200 + mi*1.3) * 2;
      ctx.fillStyle = mClrs[mi % 4];
      ctx.beginPath();
      ctx.arc(px + Math.cos(ma)*mr, maneY + Math.sin(ma)*mr*0.85, 6.5*s, 0, 6.28);
      ctx.fill();
    }

    // Head - white fur
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(px, maneY, 13*s, 0, 6.28);
    ctx.fill();

    // Blue headband/kippah
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.arc(px, maneY - 5*s, 10*s, Math.PI, 2*Math.PI);
    ctx.fill();
    // Tiny star on headband
    drawStar6(px, maneY - 8*s, 3*s);

    // Ears
    ctx.fillStyle = '#e8e8f0';
    ctx.beginPath(); ctx.arc(px - 10*s, maneY - 10*s, 5*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 10*s, maneY - 10*s, 5*s, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#c0c8e0';
    ctx.beginPath(); ctx.arc(px - 10*s, maneY - 10*s, 3*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 10*s, maneY - 10*s, 3*s, 0, 6.28); ctx.fill();

    // Eyes - fierce blue
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(px - 5*s, maneY - 1*s, 4*s, 3.5*s, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px + 5*s, maneY - 1*s, 4*s, 3.5*s, 0, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#0038b8';
    ctx.beginPath(); ctx.arc(px - 5*s, maneY - 1*s, 2*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 5*s, maneY - 1*s, 2*s, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - 4*s, maneY - 2*s, 0.8*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 6*s, maneY - 2*s, 0.8*s, 0, 6.28); ctx.fill();

    // Nose
    ctx.fillStyle = '#4466aa';
    ctx.beginPath();
    ctx.moveTo(px, maneY + 4*s);
    ctx.lineTo(px - 3*s, maneY + 7*s);
    ctx.lineTo(px + 3*s, maneY + 7*s);
    ctx.closePath();
    ctx.fill();

    // === OPEN JAW (roaring upward!) ===
    ctx.fillStyle = '#e0e8ff';
    ctx.beginPath();
    ctx.moveTo(px - 9*s, maneY - 10*s);
    ctx.quadraticCurveTo(px, maneY - 24*s, px + 9*s, maneY - 10*s);
    ctx.closePath();
    ctx.fill();
    // Inside mouth
    ctx.fillStyle = '#cc0000';
    ctx.beginPath();
    ctx.moveTo(px - 7*s, maneY - 10*s);
    ctx.quadraticCurveTo(px, maneY - 21*s, px + 7*s, maneY - 10*s);
    ctx.closePath();
    ctx.fill();
    // Teeth
    ctx.fillStyle = '#fff';
    for (var ti = -2; ti <= 2; ti++) {
      ctx.beginPath();
      var tx = px + ti * 3.2*s;
      ctx.moveTo(tx - 1.8*s, maneY - 11*s);
      ctx.lineTo(tx, maneY - 15*s);
      ctx.lineTo(tx + 1.8*s, maneY - 11*s);
      ctx.closePath();
      ctx.fill();
    }

    // Tail
    ctx.strokeStyle = '#0038b8';
    ctx.lineWidth = 3*s;
    ctx.lineCap = 'round';
    ctx.beginPath();
    var tailWag = Math.sin(performance.now()/150) * 8;
    ctx.moveTo(px, py + 24*s);
    ctx.quadraticCurveTo(px + 20*s + tailWag, py + 20*s, px + 15*s + tailWag, py + 10*s);
    ctx.stroke();
    // Tail tuft - white with blue
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(px + 15*s + tailWag, py + 10*s, 5*s, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#0038b8';
    ctx.beginPath(); ctx.arc(px + 15*s + tailWag, py + 10*s, 3*s, 0, 6.28); ctx.fill();

    // Front paws - white
    ctx.fillStyle = '#e8e8f0';
    ctx.beginPath(); ctx.ellipse(px - 13*s, py + 22*s, 5*s, 4*s, -0.2, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px + 13*s, py + 22*s, 5*s, 4*s, 0.2, 0, 6.28); ctx.fill();

    // === Blue-white glow from mouth ===
    var gs = 4 + Math.sin(performance.now() / 80) * 2;
    var eg = ctx.createRadialGradient(px, maneY - 24*s, 0, px, maneY - 24*s, gs * 3.5);
    eg.addColorStop(0, 'rgba(0,56,184,0.5)');
    eg.addColorStop(0.4, 'rgba(96,165,250,0.25)');
    eg.addColorStop(1, 'rgba(96,165,250,0)');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.arc(px, maneY - 24*s, gs * 3.5, 0, 6.28);
    ctx.fill();

    // HP bar below player
    var barW = PW;
    var barH = 4;
    var barX = px - barW/2;
    var barY = py + PH/2 + 4;
    ctx.fillStyle = 'rgba(255,0,0,0.4)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = playerHP >= 2 ? '#22ff44' : '#ff4444';
    ctx.fillRect(barX, barY, barW * (playerHP / maxPlayerHP), barH);

    ctx.restore();
  }

  function drawStarOfDavid(cx, cy, sz, color) {
    ctx.fillStyle = color;
    // Triangle pointing up
    ctx.beginPath();
    ctx.moveTo(cx, cy - sz);
    ctx.lineTo(cx + sz * 0.866, cy + sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy + sz * 0.5);
    ctx.closePath();
    ctx.fill();
    // Triangle pointing down
    ctx.beginPath();
    ctx.moveTo(cx, cy + sz);
    ctx.lineTo(cx + sz * 0.866, cy - sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy - sz * 0.5);
    ctx.closePath();
    ctx.fill();
  }

  function drawPBullet(b) {
    ctx.save();
    var col = ammoColors[b.ammoType || 0];

    // Trail glow
    var tg = ctx.createRadialGradient(b.x, b.y + 6, 0, b.x, b.y + 6, 12);
    tg.addColorStop(0, col + '66');
    tg.addColorStop(1, col + '00');
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.arc(b.x, b.y + 6, 12, 0, 6.28); ctx.fill();

    // Spin the star
    ctx.translate(b.x, b.y);
    ctx.rotate(performance.now() / 200 + (b.x * 0.1));
    ctx.translate(-b.x, -b.y);

    var starSize = 5;
    if (b.ammoType === 1) starSize = 7;       // Explosive - bigger star
    else if (b.ammoType === 2) starSize = 5;   // Piercing
    else if (b.ammoType === 3) starSize = 6;   // Lightning

    // Outer glow
    ctx.shadowColor = col;
    ctx.shadowBlur = 8;
    drawStarOfDavid(b.x, b.y, starSize, col);
    ctx.shadowBlur = 0;

    // Inner bright core
    drawStarOfDavid(b.x, b.y, starSize * 0.5, '#ffffff');

    ctx.restore();
  }

  function drawEnemy(e) {
    // Special enemy indicators
    if (e.splitter) {
      ctx.save();
      ctx.strokeStyle = '#ff44ff';
      ctx.lineWidth = 2;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size + 5, 0, 6.28);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    if (e.kamikazeActive) {
      ctx.save();
      var kamPulse = 0.5 + Math.sin(performance.now() / 100) * 0.5;
      ctx.strokeStyle = 'rgba(255,0,0,' + kamPulse + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size + 4, 0, 6.28);
      ctx.stroke();
      ctx.fillStyle = '#ff0000';
      ctx.font = 'bold 8px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('💣', e.x, e.y - e.size - 4);
      ctx.restore();
    }
    if (e.splitChild) {
      ctx.save();
      ctx.fillStyle = '#ff88ff';
      ctx.font = 'bold 6px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('mini', e.x, e.y - e.size - 2);
      ctx.restore();
    }
    ctx.save();
    var x = e.x, y = e.y, s = e.size;
    if (e.flash > 0) ctx.globalAlpha = 0.4 + Math.sin(performance.now() / 40) * 0.3;

    ctx.fillStyle = '#4a5a3a';
    ctx.beginPath();
    ctx.ellipse(x, y, s * 0.26, s * 0.65, 0, 0, 6.28);
    ctx.fill();

    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.8);
    ctx.lineTo(x + s * 0.2, y + s * 0.35);
    ctx.lineTo(x - s * 0.2, y + s * 0.35);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#6b7a5a';
    ctx.beginPath();
    ctx.moveTo(x - s * 0.26, y - s * 0.4);
    ctx.lineTo(x - s * 0.5, y - s * 0.7);
    ctx.lineTo(x - s * 0.1, y - s * 0.2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + s * 0.26, y - s * 0.4);
    ctx.lineTo(x + s * 0.5, y - s * 0.7);
    ctx.lineTo(x + s * 0.1, y - s * 0.2);
    ctx.closePath();
    ctx.fill();

    var sw = s * 0.34, sh = s * 0.09;
    ctx.fillStyle = '#239f40';
    ctx.fillRect(x - sw/2, y - sh*1.7, sw, sh);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - sw/2, y - sh*0.5, sw, sh);
    ctx.fillStyle = '#da0000';
    ctx.fillRect(x - sw/2, y + sh*0.7, sw, sh);

    if (Math.random() > 0.35) {
      var fs = s * 0.2 + Math.random() * s * 0.18;
      var fg = ctx.createRadialGradient(x, y - s*0.65, 0, x, y - s*0.65, fs);
      fg.addColorStop(0, 'rgba(255,220,80,0.7)');
      fg.addColorStop(0.5, 'rgba(255,120,20,0.25)');
      fg.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(x, y - s*0.65, fs, 0, 6.28);
      ctx.fill();
    }

    if (e.maxHp > 1) {
      var hpRatio = e.hp / e.maxHp;
      var bw = s * 0.8;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x - bw/2, y - s - 4, bw, 3);
      ctx.fillStyle = hpRatio > 0.5 ? '#22ff44' : '#ff4444';
      ctx.fillRect(x - bw/2, y - s - 4, bw * hpRatio, 3);
    }

    ctx.restore();
  }

  // ===== DRAW BOSS - Khamenei in spaceship =====
  function drawBoss() {
    if (!boss) return;
    ctx.save();
    var b = boss;
    var x = b.x, y = b.y, s = b.size;

    if (b.flash > 0) ctx.globalAlpha = 0.5 + Math.sin(performance.now() / 30) * 0.3;

    // === Spaceship body ===
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 1.3, s * 0.65, 0, 0, 6.28);
    ctx.fill();

    // Spaceship rim/edge detail
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 1.3, s * 0.65, 0, 0, 6.28);
    ctx.stroke();

    // Wings
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(x - s, y);
    ctx.lineTo(x - s * 1.8, y + s * 0.35);
    ctx.lineTo(x - s * 0.8, y + s * 0.1);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + s, y);
    ctx.lineTo(x + s * 1.8, y + s * 0.35);
    ctx.lineTo(x + s * 0.8, y + s * 0.1);
    ctx.closePath();
    ctx.fill();

    // === Glass dome ===
    var domeGrad = ctx.createRadialGradient(x, y - s*0.35, 0, x, y - s*0.2, s * 0.6);
    domeGrad.addColorStop(0, 'rgba(100,140,200,0.15)');
    domeGrad.addColorStop(0.7, 'rgba(60,80,120,0.3)');
    domeGrad.addColorStop(1, 'rgba(40,60,100,0.5)');
    ctx.fillStyle = domeGrad;
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.15, s * 0.55, s * 0.6, 0, Math.PI, 0);
    ctx.fill();
    // Dome shine
    ctx.strokeStyle = 'rgba(150,200,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.15, s * 0.55, s * 0.6, 0, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // === CHARACTER: Rotating bosses (real photos) ===
    var bossCharIdx = (b.bossNum - 1) % bossCharacters.length;
    var bossChar = bossCharacters[bossCharIdx];
    var bossImg = bossChar.img();
    var bossImgLoaded = bossChar.loaded();
    if (bossImgLoaded) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y - s * 0.2, s * 0.48, 0, 6.28);
      ctx.clip();
      var imgSize = s * 1.0;
      ctx.drawImage(bossImg, x - imgSize * 0.5, y - s * 0.2 - imgSize * 0.6, imgSize, imgSize * 1.25);
      ctx.restore();
    } else {
      var headY = y - s * 0.35;
      var headR = s * 0.22;
      ctx.fillStyle = '#e8c8a0';
      ctx.beginPath(); ctx.arc(x, headY, headR, 0, 6.28); ctx.fill();
    }

    // Rage mode aura
    if (b.rageMode) {
      var rageGlow = ctx.createRadialGradient(x, y, 0, x, y, s * 2);
      rageGlow.addColorStop(0, 'rgba(255,0,0,0)');
      rageGlow.addColorStop(0.5, 'rgba(255,0,0,' + (0.15 + Math.sin(performance.now()/150) * 0.1) + ')');
      rageGlow.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = rageGlow;
      ctx.beginPath();
      ctx.arc(x, y, s * 2, 0, 6.28);
      ctx.fill();
    }

    // Engine glow under ship
    var glowSize = b.rageMode ? s*0.7 : s*0.5;
    var glow = ctx.createRadialGradient(x, y + s*0.55, 0, x, y + s*0.55, glowSize);
    glow.addColorStop(0, b.rageMode ? 'rgba(255,0,0,0.8)' : 'rgba(255,100,0,0.6)');
    glow.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y + s*0.55, glowSize, 0, 6.28);
    ctx.fill();

    // === HP bar ===
    var hpRatio = b.hp / b.maxHp;
    var barW = s * 2.2;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(x - barW/2, y - s - 18, barW, 6);
    ctx.fillStyle = hpRatio > 0.3 ? '#ff4444' : '#ffff00';
    ctx.fillRect(x - barW/2, y - s - 18, barW * hpRatio, 6);

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px ' + FONT_TITLE;
    ctx.textAlign = 'center';
    ctx.fillText(b.label, x, y - s - 22);
    ctx.fillText(b.hp + '/' + b.maxHp, x, y - s - 10);

    ctx.restore();
  }

  function drawStealthPlane() {
    if (!stealthPlane) return;
    ctx.save();
    var sp = stealthPlane;
    var x = sp.x, y = sp.y;

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(x + 40, y);
    ctx.lineTo(x - 20, y - 8);
    ctx.lineTo(x - 30, y);
    ctx.lineTo(x - 20, y + 8);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y - 5);
    ctx.lineTo(x - 15, y - 25);
    ctx.lineTo(x - 25, y - 20);
    ctx.lineTo(x - 10, y);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y + 5);
    ctx.lineTo(x - 15, y + 25);
    ctx.lineTo(x - 25, y + 20);
    ctx.lineTo(x - 10, y);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('★', x - 5, y + 3);
    var tg = ctx.createLinearGradient(x - 30, y, x - 80, y);
    tg.addColorStop(0, 'rgba(100,150,255,0.5)');
    tg.addColorStop(1, 'rgba(100,150,255,0)');
    ctx.fillStyle = tg;
    ctx.fillRect(x - 80, y - 3, 50, 6);

    ctx.restore();
  }

  function drawPowerUps() {
    for (var i = 0; i < powerUps.length; i++) {
      var p = powerUps[i];
      ctx.save();
      ctx.globalAlpha = Math.min(1, p.life);
      var glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 14);
      glow.addColorStop(0, p.color);
      glow.addColorStop(1, p.color + '00');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 14, 0, 6.28);
      ctx.fill();
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, 6.28);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 7px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.label, p.x, p.y);
      ctx.restore();
    }
  }

  function drawTrump() {
    if (trumpTimer <= 0) return;
    ctx.save();
    var alpha = trumpTimer > 0.5 ? 1 : trumpTimer * 2;
    ctx.globalAlpha = alpha;

    var cx = W / 2, cy = H / 2;

    // Golden glow background
    var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120);
    glow.addColorStop(0, 'rgba(255,215,0,0.5)');
    glow.addColorStop(0.4, 'rgba(255,180,0,0.2)');
    glow.addColorStop(1, 'rgba(255,150,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, 120, 0, 6.28); ctx.fill();

    // === REAL PHOTO ===
    if (trumpLoaded) {
      // Draw circular framed photo
      ctx.save();
      // Gold ring border
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(cx, cy - 5, 56, 0, 6.28); ctx.stroke();
      // Clip to circle
      ctx.beginPath(); ctx.arc(cx, cy - 5, 54, 0, 6.28); ctx.clip();
      ctx.drawImage(trumpImg, cx - 54, cy - 59, 108, 135);
      ctx.restore();
    } else {
      // Fallback simple face
      ctx.fillStyle = '#e8a050';
      ctx.beginPath(); ctx.ellipse(cx, cy - 12, 28, 32, 0, 0, 6.28); ctx.fill();
      ctx.fillStyle = '#daa520';
      ctx.beginPath(); ctx.ellipse(cx, cy - 42, 34, 16, 0, 0, 6.28); ctx.fill();
    }

    // === American flags on sides ===
    ctx.font = '28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🇺🇸', cx - 75, cy);
    ctx.fillText('🇮🇱', cx + 75, cy);

    // === TEXT ===
    ctx.fillStyle = '#ffd700';
    ctx.font = '900 22px ' + FONT_TITLE;
    ctx.textAlign = 'center';
    ctx.fillText('TREMENDOUS!', cx, cy + 70);
    ctx.font = 'bold 16px ' + FONT_HEB;
    ctx.fillStyle = '#fff';
    ctx.fillText('👍 +1 LIFE! 👍', cx, cy + 90);

    ctx.restore();
  }

  function drawEBullet(b) {
    ctx.save();
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 5;
    ctx.fillStyle = b.boss ? '#ffaa00' : '#ff6b6b';
    var sz = b.boss ? 3.5 : 2.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y, sz, 0, 6.28);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 1, 0, 6.28);
    ctx.fill();
    ctx.restore();
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.col;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz * p.life, 0, 6.28);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFloats() {
    for (var i = 0; i < floats.length; i++) {
      var t = floats[i];
      ctx.save();
      ctx.globalAlpha = t.life;
      ctx.fillStyle = t.col;
      ctx.font = 'bold 14px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText(t.txt, t.x, t.y);
      ctx.restore();
    }
  }

  function drawStealthIndicator() {
    if (gameState !== PLAYING) return;
    var barW = 80, barH = 8;
    var barX = W - barW - 10, barY = 55;
    var ratio = killsSinceLastStealth / 30;

    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    ctx.fillStyle = stealthReady ? '#ff0000' : '#880000';
    ctx.fillRect(barX, barY, barW * Math.min(1, ratio), barH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px ' + FONT_TITLE;
    ctx.textAlign = 'center';
    ctx.fillText(stealthReady ? 'F-35 READY [S]' : 'F-35: ' + killsSinceLastStealth + '/30', barX + barW/2, barY + barH + 12);
    ctx.restore();
  }

  function drawPowerUpIndicator() {
    if (powerUpTimer <= 0 && shotStreams === 1 && ammoType === 0 && fireRateMultiplier === 1) return;
    ctx.save();
    var txt = '';
    if (shotStreams > 1) txt += 'x' + shotStreams + ' ';
    if (ammoType > 0) txt += ammoNames[ammoType] + ' ';
    if (fireRateMultiplier > 1) txt += 'FAST ';
    if (powerUpTimer > 0) txt += '(' + Math.ceil(powerUpTimer) + 's)';

    ctx.fillStyle = ammoColors[ammoType];
    ctx.font = 'bold 11px ' + FONT_TITLE;
    ctx.textAlign = 'left';
    ctx.fillText(txt, 10, 65);
    ctx.restore();
  }

  // ===== UPDATE =====
  function update(dt) {
    if (shakeDur > 0) {
      shakeDur--;
      shakeX = (Math.random() - 0.5) * 5;
      shakeY = (Math.random() - 0.5) * 5;
    } else { shakeX = 0; shakeY = 0; }

    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05;
      p.life -= p.dec;
      if (p.life <= 0) particles.splice(i, 1);
    }

    for (var i = floats.length - 1; i >= 0; i--) {
      floats[i].y -= 1;
      floats[i].life -= 0.014;
      if (floats[i].life <= 0) floats.splice(i, 1);
    }

    if (trumpTimer > 0) trumpTimer -= dt;

    if (gameState === WAVE_INTRO) {
      waveTimer -= dt;
      if (waveTimer <= 0) {
        gameState = PLAYING;
        if (wave % 3 === 0) {
          spawnBoss();
        } else {
          spawnWave();
        }
      }
      return;
    }

    if (gameState === BOSS_INTRO) {
      bossIntroTimer -= dt;
      if (bossIntroTimer <= 0) {
        gameState = PLAYING;
      }
      return;
    }

    if (gameState !== PLAYING) return;

    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboCount = 0; }
    if (pInvincible > 0) pInvincible -= dt;
    if (powerUpTimer > 0) {
      powerUpTimer -= dt;
      if (powerUpTimer <= 0) {
        fireRateMultiplier = 1;
        shotStreams = 1;
        ammoType = 0;
      }
    }

    // Player movement
    var dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || keys['mLeft']) dx = -1;
    if (keys['ArrowRight'] || keys['KeyD'] || keys['mRight']) dx = 1;
    if (keys['ArrowUp'] || keys['KeyW'] || keys['mUp']) dy = -1;
    if (keys['ArrowDown'] || keys['KeyS_move'] || keys['mDown']) dy = 1;
    px += dx * PSPEED;
    py += dy * PSPEED;
    var minY = H * 0.3;
    var maxY = H - (isMobile ? 170 : 50);
    px = Math.max(PW/2 + 5, Math.min(W - PW/2 - 5, px));
    py = Math.max(minY, Math.min(maxY, py));

    // Stealth key
    if (keys['KeyS'] && stealthReady) {
      keys['KeyS'] = false;
      activateStealth();
    }

    // Shooting
    var now = performance.now();
    var shotCD = BASE_SHOT_CD / fireRateMultiplier;
    if ((keys['Space'] || keys['mFire']) && now - lastShot > shotCD) {
      fireBullets();
      lastShot = now;
    }


    // Kamikaze behavior: random enemies break formation and dive at player
    if (wave >= 30) {
      for (var ki = 0; ki < enemies.length; ki++) {
        var ke = enemies[ki];
        if (ke.kamikaze && !ke.kamikazeActive && Math.random() < 0.001) {
          ke.kamikazeActive = true;
        }
        if (ke.kamikazeActive) {
          var kdx = px - ke.x, kdy = py - ke.y;
          var kd = Math.sqrt(kdx*kdx + kdy*kdy) || 1;
          ke.x += (kdx/kd) * 3.5;
          ke.y += (kdy/kd) * 3.5;
        }
      }
    }
    // Update stealth plane
    if (stealthPlane) {
      stealthPlane.x += 8;
      if (stealthPlane.phase === 0) {
        for (var i = enemies.length - 1; i >= 0; i--) {
          var e = enemies[i];
          if (Math.abs(e.x - stealthPlane.x) < 60) {
            e.hp -= 20;
            if (e.hp <= 0) {
              score += 50;
              totalKills++;
              boom(e.x, e.y);
              addFloat(e.x, e.y, '+50', '#ff8844');
              enemies.splice(i, 1);
            }
          }
        }
        if (boss && Math.abs(boss.x - stealthPlane.x) < 80) {
          boss.hp -= 20;
          boss.flash = 0.3;
          addFloat(boss.x, boss.y, '-20', '#ff8844');
          bigBoom(boss.x, boss.y);
          if (boss.hp <= 0) {
            defeatBoss();
          }
        }
        for (var i = eBullets.length - 1; i >= 0; i--) {
          if (Math.abs(eBullets[i].x - stealthPlane.x) < 80 && Math.abs(eBullets[i].y - stealthPlane.y) < 100) {
            eBullets.splice(i, 1);
          }
        }
      }
      if (stealthPlane.x > W + 100) {
        stealthPlane = null;
        stealthActive = false;
      }
    }

    // Update player bullets
    for (var i = pBullets.length - 1; i >= 0; i--) {
      var b = pBullets[i];
      b.y -= 7;
      if (b.vx) b.x += b.vx;
      if (b.y < -20) pBullets.splice(i, 1);
    }

    // Update powerups
    for (var i = powerUps.length - 1; i >= 0; i--) {
      var pu = powerUps[i];
      pu.y += pu.vy;
      pu.life -= dt;
      if (pu.life <= 0 || pu.y > H + 20) { powerUps.splice(i, 1); continue; }
      if (Math.abs(pu.x - px) < PW/2 + 12 && Math.abs(pu.y - py) < PH/2 + 12) {
        collectPowerUp(pu);
        powerUps.splice(i, 1);
      }
    }

    // BOSS UPDATE
    if (boss) {
      if (boss.y < boss.targetY) {
        boss.y += 1.5;
      } else {
        boss.moveTimer += dt;
        if (boss.flash > 0) boss.flash -= dt;

        // Rage mode when HP < 30%
        if (!boss.rageMode && boss.hp < boss.maxHp * 0.3) {
          boss.rageMode = true;
          addFloat(boss.x, boss.y - 40, '⚠ RAGE MODE! ⚠', '#ff0000');
          shakeDur = 15;
        }

        var moveAmp = wave >= 12 ? 3.5 : (wave >= 9 ? 2.8 : 2);
        var moveSpd = wave >= 12 ? 2.5 : (wave >= 9 ? 2.0 : 1.5);
        if (boss.rageMode) { moveAmp *= 1.5; moveSpd *= 1.4; }

        // Movement: sinusoidal + charging at high waves
        if (wave >= 9 && boss.chargeTimer > 0) {
          boss.chargeTimer -= dt;
          boss.x += boss.chargeDir * 6;
          boss.x = Math.max(boss.size, Math.min(W - boss.size, boss.x));
        } else {
          boss.x += Math.sin(boss.moveTimer * moveSpd) * moveAmp;
          // Random charge at player for wave 9+
          if (wave >= 9 && Math.random() < 0.003 * (boss.rageMode ? 3 : 1)) {
            boss.chargeDir = px > boss.x ? 1 : -1;
            boss.chargeTimer = 0.5;
          }
        }

        // Determine attack pattern based on wave
        var bulletSpeed = 3 + wave * 0.15;
        if (boss.rageMode) bulletSpeed *= 1.3;
        var burstMax = wave >= 12 ? 8 : (wave >= 9 ? 6 : 5);
        var pauseTime = wave >= 12 ? 0.6 : (wave >= 9 ? 1.0 : 1.5);
        if (boss.rageMode) pauseTime *= 0.6;
        var shootInterval = wave >= 12 ? 0.15 : (wave >= 9 ? 0.2 : 0.3);

        if (boss.shootPhase === 0) {
          boss.shootTimer -= dt;
          if (boss.shootTimer <= 0) {
            // Attack pattern varies by wave
            if (wave >= 12) {
              // NIGHTMARE: spiral + spread + aimed
              boss.spiralAngle += 0.4;
              var numBullets = boss.rageMode ? 10 : 7;
              for (var s = 0; s < numBullets; s++) {
                var angle = boss.spiralAngle + (s / numBullets) * 6.28;
                eBullets.push({
                  x: boss.x, y: boss.y + boss.size * 0.6,
                  vx: Math.cos(angle) * bulletSpeed * 0.7,
                  vy: Math.sin(angle) * bulletSpeed * 0.5 + bulletSpeed * 0.5,
                  boss: true
                });
              }
              // Also fire aimed shot at player
              var aimDx = px - boss.x, aimDy = py - boss.y;
              var aimDist = Math.sqrt(aimDx*aimDx + aimDy*aimDy) || 1;
              eBullets.push({
                x: boss.x, y: boss.y + boss.size * 0.6,
                vx: (aimDx/aimDist) * bulletSpeed * 1.2,
                vy: (aimDy/aimDist) * bulletSpeed * 1.2,
                boss: true
              });
            } else if (wave >= 9) {
              // RAGE: alternating spread + aimed bursts
              if (boss.burstCount % 2 === 0) {
                // Wide spread
                for (var s = -3; s <= 3; s++) {
                  eBullets.push({
                    x: boss.x + s * 12,
                    y: boss.y + boss.size * 0.6,
                    vx: s * 1.0,
                    vy: bulletSpeed,
                    boss: true
                  });
                }
              } else {
                // Aimed triple shot at player
                var aimDx = px - boss.x, aimDy = py - boss.y;
                var aimDist = Math.sqrt(aimDx*aimDx + aimDy*aimDy) || 1;
                for (var sp = -1; sp <= 1; sp++) {
                  eBullets.push({
                    x: boss.x + sp * 15,
                    y: boss.y + boss.size * 0.6,
                    vx: (aimDx/aimDist) * bulletSpeed + sp * 0.5,
                    vy: (aimDy/aimDist) * bulletSpeed,
                    boss: true
                  });
                }
              }
            } else {
              // Normal boss: simple spread
              for (var s = -2; s <= 2; s++) {
                eBullets.push({
                  x: boss.x + s * 15,
                  y: boss.y + boss.size * 0.6,
                  vx: s * 0.8,
                  vy: bulletSpeed,
                  boss: true
                });
              }
            }

            boss.burstCount++;
            if (boss.burstCount >= burstMax) {
              boss.shootPhase = 1;
              boss.pauseTimer = pauseTime;
              boss.burstCount = 0;
              boss.attackPattern = (boss.attackPattern + 1) % 3;
            } else {
              boss.shootTimer = shootInterval;
            }
          }
        } else {
          boss.pauseTimer -= dt;
          if (boss.pauseTimer <= 0) {
            boss.shootPhase = 0;
            boss.shootTimer = shootInterval;
          }
        }
      }

      // Bullet-boss collision
      for (var bi = pBullets.length - 1; bi >= 0; bi--) {
        var b = pBullets[bi];
        var dx2 = b.x - boss.x, dy2 = b.y - boss.y;
        if (dx2*dx2 + dy2*dy2 < (boss.size+10)*(boss.size+10)) {
          var dmg = 1;
          if (b.ammoType === 1) { dmg = 3; boom(b.x, b.y); }
          else if (b.ammoType === 2) dmg = 2;
          else if (b.ammoType === 3) { dmg = 1; addP(b.x, b.y, '#aa66ff', 5, 2); }

          boss.hp -= dmg;
          boss.flash = 0.1;
          interceptFX(b.x, b.y);
          playSfxHit();
          addFloat(b.x, b.y - 10, '-' + dmg, '#ff8844');

          if (b.ammoType !== 2) {
            pBullets.splice(bi, 1);
          }

          if (boss.hp <= 0) {
            defeatBoss();
            break;
          }
        }
      }
    }

    // Enemy update (regular enemies)
    if (!boss) {
      var hitEdge = false;
      for (var i = 0; i < enemies.length; i++) {
        enemies[i].x += eDirX * eSpeed;
        if (enemies[i].x < 22 || enemies[i].x > W - 22) hitEdge = true;
        if (enemies[i].flash > 0) enemies[i].flash -= dt;
      }
      if (hitEdge) {
        eDirX *= -1;
        for (var i = 0; i < enemies.length; i++) enemies[i].y += 10;
      }

      for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];
        e.shootCD -= dt * 1000;
        if (e.shootCD <= 0) {
          e.shootCD = Math.max(700, 2800 - wave * 180) + Math.random() * 2500;
          if (Math.random() < 0.2 + wave * 0.04) {
            var bulletSpeed = 2.2 + wave * 0.25;
            eBullets.push({ x: e.x, y: e.y + e.size, vx: 0, vy: bulletSpeed });
          }
        }
      }
    }

    // Update enemy bullets
    for (var i = eBullets.length - 1; i >= 0; i--) {
      var eb = eBullets[i];
      eb.y += eb.vy;
      if (eb.vx) eb.x += eb.vx;
      if (eb.y > H + 20 || eb.x < -20 || eb.x > W + 20) eBullets.splice(i, 1);
    }

    // Player bullet vs enemies
    for (var bi = pBullets.length - 1; bi >= 0; bi--) {
      var b = pBullets[bi];
      var hitEnemy = false;
      for (var ei = enemies.length - 1; ei >= 0; ei--) {
        var e = enemies[ei];
        var dx2 = b.x - e.x, dy2 = b.y - e.y;
        if (dx2*dx2 + dy2*dy2 < (e.size+5)*(e.size+5)) {
          hitEnemy = true;
          var dmg = 1;
          if (b.ammoType === 1) { dmg = 3; boom(b.x, b.y); }
          else if (b.ammoType === 2) dmg = 2;
          else if (b.ammoType === 3) dmg = 1;

          e.hp -= dmg;
          e.flash = 0.15;
          playSfxHit();
          if (e.hp <= 0) {
            comboCount++;
            comboTimer = 2.5;
            var pts = 10 * comboCount;
            if (selectedDefender === 'bengurion') pts = Math.floor(pts * 1.5);
            score += pts;
            totalKills++;
            killsSinceLastStealth++;
            checkRankUp();
            boom(e.x, e.y);
            playSfxKill();
            addFloat(e.x, e.y - 12, '+' + pts, comboCount > 3 ? '#fbbf24' : '#60a5fa');
            maybeSpawnPowerUp(e.x, e.y);
            // Splitter: spawn 2 small enemies
            if (e.splitter) {
              for (var si = 0; si < 2; si++) {
                enemies.push({
                  x: e.x + (si === 0 ? -15 : 15),
                  y: e.y,
                  size: 12,
                  hp: Math.max(1, Math.floor(e.maxHp * 0.4)),
                  maxHp: Math.max(1, Math.floor(e.maxHp * 0.4)),
                  flash: 0,
                  shootCD: 1500 + Math.random() * 2000,
                  splitter: false,
                  splitChild: true,
                  kamikaze: false
                });
              }
              addFloat(e.x, e.y + 10, 'SPLIT!', '#ff44ff');
            }
            enemies.splice(ei, 1);

            if (killsSinceLastStealth >= 30 && !stealthReady) {
              stealthReady = true;
              addFloat(W/2, H/2, 'F-35 READY!', '#ff0000');
            }
            updateStealthBtn();

            if (totalKills > 0 && totalKills % 100 === 0 && totalKills !== lastExtraLife) {
              lastExtraLife = totalKills;
              lives++;
              trumpTimer = 3;
              addFloat(W/2, H/2 - 100, '+1 LIFE!', '#ffd700');
            }
          } else {
            interceptFX(b.x, b.y);
          }
          break;
        }
      }
      if (hitEnemy && b.ammoType !== 2) pBullets.splice(bi, 1);
    }

    // Enemy bullets hit player
    if (pInvincible <= 0) {
      for (var i = eBullets.length - 1; i >= 0; i--) {
        var b = eBullets[i];
        if (Math.abs(b.x - px) < PW/2 + 3 && Math.abs(b.y - py) < PH/2 + 3) {
          eBullets.splice(i, 1);
          hitPlayer();
          break;
        }
      }
    }

    // Enemy reaches bottom
    for (var i = enemies.length - 1; i >= 0; i--) {
      if (enemies[i].y > H - 75) {
        boom(enemies[i].x, enemies[i].y);
        enemies.splice(i, 1);
        hitPlayer();
      }
    }

    // Wave complete
    if (!boss && enemies.length === 0 && gameState === PLAYING) {
      wave++;
      score += wave * 50;
      updateHUD();
      gameState = WAVE_INTRO;
      waveTimer = 2.0;
      playSfxWaveStart();
    }

    updateHUD();
  }

  function defeatBoss() {
    score += boss.maxHp * 20;
    totalKills += 10;
    killsSinceLastStealth += 10;
    bigBoom(boss.x, boss.y);
    playSfxBossDeath();
    addFloat(boss.x, boss.y, 'BOSS DEFEATED!', '#ffd700');
    addFloat(boss.x, boss.y + 30, '+' + (boss.maxHp * 20), '#fbbf24');

    if (killsSinceLastStealth >= 30 && !stealthReady) {
      stealthReady = true;
      addFloat(W/2, H/2 + 60, 'F-35 READY!', '#ff0000');
    }
    updateStealthBtn();

    boss = null;
    wave++;
    updateHUD();
    gameState = WAVE_INTRO;
    waveTimer = 2.5;
    // Fanfare plays after the boss death cry finishes
    setTimeout(function() { playSfxWaveStart(); }, 1400);
  }

  function fireBullets() {
    var baseY = py - PH/2 - 12;
    if (shotStreams === 1) {
      pBullets.push({ x: px, y: baseY, ammoType: ammoType });
    } else if (shotStreams === 2) {
      pBullets.push({ x: px - 8, y: baseY, ammoType: ammoType });
      pBullets.push({ x: px + 8, y: baseY, ammoType: ammoType });
    } else if (shotStreams === 3) {
      pBullets.push({ x: px, y: baseY, ammoType: ammoType });
      pBullets.push({ x: px - 10, y: baseY, vx: -0.5, ammoType: ammoType });
      pBullets.push({ x: px + 10, y: baseY, vx: 0.5, ammoType: ammoType });
    } else {
      pBullets.push({ x: px - 6, y: baseY, ammoType: ammoType });
      pBullets.push({ x: px + 6, y: baseY, ammoType: ammoType });
      pBullets.push({ x: px - 14, y: baseY, vx: -0.8, ammoType: ammoType });
      pBullets.push({ x: px + 14, y: baseY, vx: 0.8, ammoType: ammoType });
    }
  }

  function collectPowerUp(pu) {
    addFloat(pu.x, pu.y - 15, pu.label + '!', pu.color);

    if (pu.type === 'heart') {
      // Restore 1 HP (or +1 life if HP full)
      if (playerHP < maxPlayerHP) {
        playerHP++;
        addFloat(pu.x, pu.y - 30, '+1 HP', '#ff3366');
      } else if (maxPlayerHP < 6) {
        maxPlayerHP++;
        playerHP = maxPlayerHP;
        addFloat(pu.x, pu.y - 30, 'MAX HP UP!', '#ff3366');
      } else {
        score += 500;
        addFloat(pu.x, pu.y - 30, '+500', '#ffd700');
      }
      addP(pu.x, pu.y, '#ff3366', 15, 2);
      updateHUD();
      return;
    }
    if (pu.type === 'shield') {
      shieldTimer = 8; // 8 seconds of invincibility
      pInvincible = 8;
      addFloat(pu.x, pu.y - 30, 'SHIELD 8s!', '#44ddff');
      addP(pu.x, pu.y, '#44ddff', 20, 3);
      return;
    }

    powerUpTimer = 12;
    switch (pu.type) {
      case 'fireRate': fireRateMultiplier = 2.5; break;
      case 'split2': shotStreams = 2; break;
      case 'split3': shotStreams = 3; break;
      case 'split4': shotStreams = 4; break;
      case 'explosive': ammoType = 1; break;
      case 'piercing': ammoType = 2; break;
      case 'electric': ammoType = 3; break;
    }
  }

  function hitPlayer() {
    playerHP--;
    pInvincible = 1.5;
    shakeDur = 10;
    addP(px, py, '#ff4444', 12, 3);

    if (playerHP <= 0) {
      lives--;
      if (lives <= 0) {
        doGameOver();
      } else {
        playerHP = maxPlayerHP;
        pInvincible = 3;
        addFloat(px, py - 30, 'LIFE LOST!', '#ff4444');
      }
    }
  }

  function doGameOver() {
    gameState = GAMEOVER;
    stopMusic();
    document.getElementById('hud').style.display = 'none';
    if (isMobile) document.getElementById('mobileControls').style.display = 'none';

    var el = document.getElementById('gameOverScreen');
    el.classList.remove('hidden');
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalWave').textContent = 'הגעת לגל ' + wave + ' | השמדת ' + totalKills + ' טילים';

    var msgs = ['עם ישראל חי! 🇮🇱','שאגת הארי! 🦁','ביחד ננצח! 💪','Am Yisrael Chai! 🇮🇱','ישראל חזקה! 💙'];
    document.getElementById('endMessage').textContent = msgs[Math.floor(Math.random() * msgs.length)];

    // High score check
    if (isHighScore(score)) {
      var playerName = prompt('🏆 שיא חדש! הכנס שם:\nNew High Score! Enter name:', 'Player') || 'Player';
      saveHighScore(playerName, score, wave, totalKills, selectedDefender);
      document.getElementById('goHighScore').innerHTML = '🏆 NEW HIGH SCORE! 🏆';
    } else {
      document.getElementById('goHighScore').innerHTML = '';
    }
    renderHighScores('goHighScore');

    document.getElementById('tapHint').style.display = 'none';
    gameOverReady = false;
    setTimeout(function() {
      document.getElementById('tapHint').style.display = 'block';
      gameOverReady = true;
    }, 2000);
  }

  function updateHUD() {
    document.getElementById('hudScore').textContent = score;
    document.getElementById('hudWave').textContent = wave;
    document.getElementById('hudHP').textContent = playerHP + '/' + maxPlayerHP;
    document.getElementById('hudKills').textContent = totalKills;
    document.getElementById('hudRank').textContent = getCurrentRank().name;
    var el = document.getElementById('hudLives');
    var html = '';
    for (var i = 0; i < Math.max(lives, 3); i++) html += '<span>' + (i < lives ? '❤️' : '🖤') + '</span>';
    el.innerHTML = html;
  }

  // ===== LO-FI SYNTH GAME MUSIC ENGINE V2 =====
  var musicCtx = null;
  var musicPlaying = false;
  var musicGain = null;
  var delayNode = null;
  var delayGain = null;
  var filterNode = null;
  var musicBPM = 132;
  var musicStep = 0;
  var musicInterval = null;

  function initMusic() {
    if (musicCtx) return;
    try {
      musicCtx = new (window.AudioContext || window.webkitAudioContext)();
      musicGain = musicCtx.createGain();
      musicGain.gain.value = 0.20;

      // === DELAY EFFECT (ping-pong style) ===
      delayNode = musicCtx.createDelay(1.0);
      delayNode.delayTime.value = 60 / musicBPM * 0.75; // dotted-8th delay
      delayGain = musicCtx.createGain();
      delayGain.gain.value = 0.30; // feedback amount
      // Lo-fi filter on delay return
      filterNode = musicCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.frequency.value = 2200;
      filterNode.Q.value = 1.5;

      // Routing: musicGain -> dest + delay -> filter -> delayGain -> delay (feedback)
      musicGain.connect(musicCtx.destination);
      musicGain.connect(delayNode);
      delayNode.connect(filterNode);
      filterNode.connect(delayGain);
      delayGain.connect(musicCtx.destination);
      delayGain.connect(delayNode); // feedback loop
    } catch(e) { return; }
  }

  // Synth with character: PWM-like effect using 2 detuned oscillators + filter sweep
  function playSynth(freq, startTime, dur, vol, bright) {
    if (!musicCtx || freq <= 0) return;
    var g = musicCtx.createGain();
    var flt = musicCtx.createBiquadFilter();
    flt.type = 'lowpass';
    flt.frequency.setValueAtTime(bright ? 3500 : 1800, startTime);
    flt.frequency.exponentialRampToValueAtTime(bright ? 1200 : 600, startTime + dur * 0.8);
    flt.Q.value = 4;

    // Osc 1: square, slightly sharp
    var o1 = musicCtx.createOscillator();
    o1.type = 'square'; o1.frequency.value = freq * 1.004;
    // Osc 2: sawtooth, slightly flat
    var o2 = musicCtx.createOscillator();
    o2.type = 'sawtooth'; o2.frequency.value = freq * 0.996;

    var mix = musicCtx.createGain();
    mix.gain.value = 0.5;
    o1.connect(mix); o2.connect(mix);
    mix.connect(flt); flt.connect(g); g.connect(musicGain);

    g.gain.setValueAtTime(vol || 0.08, startTime);
    g.gain.setValueAtTime(vol * 0.9, startTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);

  // Fat bass: sub sine + mid saw
  function playBass(freq, startTime, dur) {
    if (!musicCtx || freq <= 0) return;
    var g = musicCtx.createGain();
    g.gain.setValueAtTime(0.14, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);

    // Sub sine
    var sub = musicCtx.createOscillator();
    sub.type = 'sine'; sub.frequency.value = freq;
    var subG = musicCtx.createGain(); subG.gain.value = 0.7;
    sub.connect(subG); subG.connect(g);

    // Mid saw with filter
    var saw = musicCtx.createOscillator();
    saw.type = 'sawtooth'; saw.frequency.value = freq * 2;
    var flt = musicCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 400; flt.Q.value = 2;
    var sawG = musicCtx.createGain(); sawG.gain.value = 0.3;
    saw.connect(flt); flt.connect(sawG); sawG.connect(g);

    g.connect(musicGain);
    sub.start(startTime); sub.stop(startTime + dur + 0.05);
    saw.start(startTime); saw.stop(startTime + dur + 0.05);
  }

    o.start(startTime); o.stop(startTime + dur + 0.05);
  }

  function playDrum(type, startTime) {
    if (!musicCtx) return;
    if (type === 'kick') {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(160, startTime);
      o.frequency.exponentialRampToValueAtTime(35, startTime + 0.15);
      g.gain.setValueAtTime(0.38, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.25);
      // Click transient
      var cl = musicCtx.createOscillator(); var cg = musicCtx.createGain();
      cl.type = 'square'; cl.frequency.value = 800;
      cg.gain.setValueAtTime(0.12, startTime);
      cg.gain.exponentialRampToValueAtTime(0.001, startTime + 0.015);
      o.connect(g); g.connect(musicGain);
      cl.connect(cg); cg.connect(musicGain);
      o.start(startTime); o.stop(startTime + 0.3);
      cl.start(startTime); cl.stop(startTime + 0.02);
    } else if (type === 'snare') {
      // Body
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(250, startTime);
      o.frequency.linearRampToValueAtTime(120, startTime + 0.06);
      g.gain.setValueAtTime(0.15, startTime);

      o.connect(g); g.connect(musicGain);
      o.start(startTime); o.stop(startTime + 0.15);

      for (var ni = 0; ni < 3; ni++) {
        var n = musicCtx.createOscillator(); var ng = musicCtx.createGain();
        n.type = 'sawtooth'; n.frequency.value = 3000 + ni * 1500 + Math.random() * 1000;
        ng.gain.setValueAtTime(0.06, startTime);
        ng.gain.exponentialRampToValueAtTime(0.001, startTime + 0.06 + ni * 0.02);
        n.connect(ng); ng.connect(musicGain);
        n.start(startTime); n.stop(startTime + 0.1 + ni * 0.02);
      }
    } else if (type === 'hat') {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();
      o.type = 'square'; o.frequency.value = 7000 + Math.random() * 3000;
      g.gain.setValueAtTime(0.035, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.035);
      o.connect(g); g.connect(musicGain);
      o.start(startTime); o.stop(startTime + 0.05);
    } else if (type === 'openhat') {
      var o = musicCtx.createOscillator(); var g = musicCtx.createGain();

        c.connect(cg); cg.connect(musicGain);
        c.start(startTime + ci * 0.01); c.stop(startTime + ci * 0.01 + 0.08);

    }

  function scheduleBar() {
    if (!musicCtx || !musicPlaying) return;
    var stepDur = 60 / musicBPM / 4; // 16th note
    var now = musicCtx.currentTime + 0.05; // small look-ahead

    for (var i = 0; i < 32; i++) {
      var t = now + i * stepDur;
      var idx = (musicStep + i) % melodyNotes.length;

      // Lead synth with character
      if (melodyNotes[idx] > 0) {
        playSynth(melodyNotes[idx], t, stepDur * 2.5, 0.07, idx % 8 < 4);
      }

      // Bass (only on non-zero)
      if (bassNotes[idx] > 0) {
        playBass(bassNotes[idx], t, stepDur * 3);
      }

      // Arp layer (soft shimmer)
      if (arpNotes[idx] > 0 && i % 2 === 0) {
        playArp(arpNotes[idx], t, stepDur * 1.5);
      }

      // === DRUM PATTERN (more interesting) ===
      var beat = i % 16; // within each bar of 16 16th-notes
      // Kick: 1, and-of-3, 1 (syncopated)
      if (beat === 0 || beat === 6 || beat === 10) playDrum('kick', t);
      // Snare: 4, 12 (2 and 4)
      if (beat === 4 || beat === 12) playDrum('snare', t);
      // Clap layered on beat 12 every other bar
      if (beat === 12 && i >= 16) playDrum('clap', t);
      // Hats: running 8ths with some 16th ghost notes
      if (beat % 2 === 0) playDrum('hat', t);
      if ((beat === 3 || beat === 7 || beat === 11 || beat === 15) && Math.random() > 0.3)
        playDrum('hat', t);
      // Open hat on the "and" of 2
      if (beat === 5) playDrum('openhat', t);
    }

    musicStep = (musicStep + 32) % melodyNotes.length;
  }

  function startMusic() {
    ensureAudioReady();

    if (!musicCtx) return;
    if (musicCtx.state === 'suspended') musicCtx.resume();
    musicPlaying = true;
    musicStep = 0;
    scheduleBar();
    var barDur = (60 / musicBPM / 4) * 32 * 1000; // 2 bars worth
    musicInterval = setInterval(function() {
      if (musicPlaying) scheduleBar();
    }, barDur - 80);
  }

  function stopMusic() {
    musicPlaying = false;
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  }

  function frame(ts) {

    prevTime = ts;

    update(dt);

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBG();

    if (gameState === PLAYING || gameState === WAVE_INTRO || gameState === BOSS_INTRO) {
      for (var i = 0; i < enemies.length; i++) drawEnemy(enemies[i]);
      drawBoss();
      for (var i = 0; i < eBullets.length; i++) drawEBullet(eBullets[i]);
      for (var i = 0; i < pBullets.length; i++) drawPBullet(pBullets[i]);
      drawPowerUps();
      drawStealthPlane();
      drawPlayer();
      drawStealthIndicator();
      drawPowerUpIndicator();

      // Flashing prompt when F-35 ready
      if (stealthReady) {
        ctx.save();
        var pulse = 0.5 + Math.sin(performance.now() / 200) * 0.5;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ff3300';
        ctx.font = '900 ' + (isMobile ? '22' : '28') + 'px ' + FONT_TITLE;
        ctx.textAlign = 'center';
        if (isMobile) {

          ctx.fillText('🇺🇸 PRESS S - F-35 STEALTH BOMBER! 🇺🇸', W/2, H * 0.18);
        }
        ctx.restore();
      }

      if (comboCount > 1 && comboTimer > 0) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, comboTimer);
        ctx.fillStyle = comboCount > 4 ? '#fbbf24' : '#60a5fa';
        var fs = Math.min(36, 20 + comboCount * 3);
        ctx.font = '900 ' + fs + 'px ' + FONT_TITLE;
        ctx.textAlign = 'center';
        ctx.fillText('COMBO x' + comboCount + '!', W/2, H * 0.35);
        ctx.restore();
      }
    }

    if (gameState === WAVE_INTRO) {
      var a = waveTimer < 0.5 ? waveTimer*2 : (waveTimer > 1.5 ? (2-waveTimer)*2 : 1);
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, a));

      keys[e.code] = true;
    } else {
      keys[e.code] = true;
    }
    if (e.code === 'Space') e.preventDefault();
    if (gameState === GAMEOVER && gameOverReady && (e.code === 'Space' || e.code === 'Enter')) {
      gameOverReady = false;
      restartWithCountdown();
    }
  });
  document.addEventListener('keyup', function(e) { keys[e.code] = false; });

  // Mobile controls
  function bindTouch(id, key) {
    var el = document.getElementById(id);
    if (!el) return;

    function activate(e) {
      e.preventDefault();
      e.stopPropagation();
      if (key === 'stealth') { activateStealth(); return; }
      keys[key] = true;
      el.classList.add('active');
    }
    function deactivate(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (key === 'stealth') return;
      keys[key] = false;
      el.classList.remove('active');
    }

    el.addEventListener('touchstart', activate, { passive: false });
    el.addEventListener('touchend', deactivate, { passive: false });
    el.addEventListener('touchcancel', deactivate, { passive: false });
    el.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (key === 'stealth') return;
      var touch = e.touches[0];
      var rect = el.getBoundingClientRect();
      if (touch.clientX < rect.left - 30 || touch.clientX > rect.right + 30 ||
          touch.clientY < rect.top - 30 || touch.clientY > rect.bottom + 30) {
        keys[key] = false;
        el.classList.remove('active');
      }
    }, { passive: false });

    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      if (key === 'stealth') { activateStealth(); return; }
      keys[key] = true; el.classList.add('active');
    });
    el.addEventListener('mouseup', function(e) { e.preventDefault(); if (key !== 'stealth') { keys[key] = false; el.classList.remove('active'); } });
    el.addEventListener('mouseleave', function(e) { if (key !== 'stealth') { keys[key] = false; el.classList.remove('active'); } });
  }

  bindTouch('btnLeft', 'mLeft');
  bindTouch('btnRight', 'mRight');
  bindTouch('btnUp', 'mUp');
  bindTouch('btnDown', 'mDown');
  bindTouch('btnFire', 'mFire');
  bindTouch('btnStealth', 'stealth');

  document.addEventListener('touchend', function(e) {
    if (gameState === PLAYING || gameState === WAVE_INTRO) {
      var now = Date.now();
      if (now - (document._lastTap || 0) < 300) e.preventDefault();
      document._lastTap = now;
    }
  }, { passive: false });

  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
