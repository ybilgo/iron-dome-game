<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>שאגת הארי - Lion's Roar Defense</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0a1a;
    overflow: hidden;
    font-family: Arial, sans-serif;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
    position: fixed;
    top: 0; left: 0;
  }

  canvas {
    display: block;
    width: 100%; height: 100%;
    position: fixed;
    top: 0; left: 0;
    touch-action: none;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: radial-gradient(ellipse at center, #0d1b3e 0%, #050a15 70%);
    padding: 20px;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  .overlay.hidden { display: none !important; }

  .title {
    font-family: 'Courier New', monospace;
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, #60a5fa 50%, #fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 700;
    color: #fff;
    margin-bottom: 1rem;
    text-align: center;
  }

  .hebrew-title {
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 900;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .motto {
    color: #fbbf24;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    margin-top: 0.5rem;
    text-align: center;
  }

  .flag-icon {
    width: 100px; height: 68px;
    margin: 0.8rem auto;
    position: relative;
    border: 2px solid rgba(96,165,250,0.3);
    overflow: hidden;
  }
  .flag-bg { background: #fff; width: 100%; height: 100%; }
  .flag-stripe-top, .flag-stripe-bottom {
    position: absolute; left: 0; right: 0; height: 14px; background: #0038b8;
  }
  .flag-stripe-top { top: 7px; }
  .flag-stripe-bottom { bottom: 7px; }
  .star-david-css {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 20px solid #0038b8;
  }
  .star-david-css::after {
    content: ''; position: absolute;
    top: 7px; left: -12px;
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 20px solid #0038b8;
  }

  .countdown-num {
    font-family: 'Courier New', monospace;
    font-size: clamp(5rem, 25vw, 10rem);
    font-weight: 900;
    color: #60a5fa;
    text-align: center;
    text-shadow: 0 0 40px rgba(96,165,250,0.6);
    animation: countPulse 0.9s ease-out;
  }
  .countdown-num.c2 { color: #fbbf24; text-shadow: 0 0 40px rgba(251,191,36,0.6); }
  .countdown-num.c1 { color: #ef4444; text-shadow: 0 0 40px rgba(239,68,68,0.6); }
  .countdown-num.go { color: #22c55e; text-shadow: 0 0 40px rgba(34,197,94,0.6); font-size: clamp(4rem, 20vw, 8rem); }

  @keyframes countPulse {
    0% { transform: scale(1.5); opacity: 0; }
    30% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.8; }
  }

  .countdown-sub {
    color: #8899bb;
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    margin-top: 1rem;
  }

  .instructions {
    color: #8899bb;
    margin-top: 1.5rem;
    text-align: center;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    line-height: 2;
  }
  .instructions span { color: #60a5fa; font-weight: 700; }

  .gameover-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(5,10,21,0.88);
    padding: 20px;
    cursor: pointer;
  }
  .gameover-overlay.hidden { display: none !important; }

  .score-display {
    font-family: 'Courier New', monospace;
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    color: #60a5fa;
    margin: 1rem 0;
  }

  .tap-hint {
    color: #60a5fa;
    font-family: 'Courier New', monospace;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    font-weight: 700;
    margin-top: 2rem;
    animation: blinker 1.2s ease-in-out infinite;
  }
  @keyframes blinker {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding-top: env(safe-area-inset-top, 0px);
    height: calc(46px + env(safe-area-inset-top, 0px));
    display: none;
    align-items: center;
    justify-content: space-between;
    padding-left: max(8px, env(safe-area-inset-left, 0px));
    padding-right: max(8px, env(safe-area-inset-right, 0px));
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
    z-index: 50;
    font-family: 'Courier New', monospace;
    font-size: clamp(0.55rem, 1.8vw, 0.85rem);
  }
  .hud-item { color: #fff; display: flex; align-items: center; gap: 4px; }
  .hud-value { color: #60a5fa; font-weight: 700; }
  .hud-lives { display: flex; gap: 2px; font-size: 0.85rem; flex-shrink: 0; max-width: 120px; overflow: hidden; }

  /* ===== NEW MOBILE CONTROLS: dual-thumb layout ===== */
  #mobileControls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 60;
    display: none;
    direction: ltr; /* Force LTR: fire on LEFT, d-pad on RIGHT */
    justify-content: space-between;
    align-items: flex-end;
    padding: 10px 14px;
    padding-bottom: max(15px, env(safe-area-inset-bottom, 10px));
    background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    touch-action: none;
    pointer-events: none;
  }

  /* Left side: Fire + F-35 (stacked) */
  .controls-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: auto;
  }

  /* Right side: D-pad */
  .controls-right {
    display: grid;
    direction: ltr; /* Force LTR so grid isn't flipped by RTL page */
    grid-template-areas:
      ".    up   ."
      "left .    right"
      ".    down .";
    grid-template-columns: 64px 64px 64px;
    grid-template-rows: 64px 64px 64px;
    gap: 5px;
    pointer-events: auto;
  }

  .mobile-btn {
    width: 64px; height: 64px;
    border: 2px solid rgba(96,165,250,0.6);
    background: rgba(96,165,250,0.15);
    border-radius: 50%;
    color: #fff; font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }
  .mobile-btn.active, .mobile-btn:active {
    background: rgba(96,165,250,0.45);
    border-color: #60a5fa;
    transform: scale(0.93);
  }
  .fire-btn {
    width: 90px; height: 90px;
    border-color: #ef4444;
    background: rgba(239,68,68,0.18);
    font-size: 0.7rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    border-radius: 50%;
  }
  .fire-btn.active, .fire-btn:active {
    background: rgba(239,68,68,0.5);
    border-color: #ff6b6b;
    transform: scale(0.93);
  }
  .stealth-btn {
    width: 62px; height: 62px;
    border-color: #555;
    background: rgba(80,80,80,0.3);
    font-size: 0.5rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: #888;
    transition: all 0.3s ease;
  }
  .stealth-btn.ready {
    width: 72px; height: 72px;
    border: 3px solid #ff0000;
    background: rgba(255,0,0,0.35);
    color: #fff;
    font-size: 0.65rem;
    animation: f35pulse 0.6s ease-in-out infinite;
    box-shadow: 0 0 15px rgba(255,0,0,0.6), 0 0 30px rgba(255,0,0,0.3), inset 0 0 10px rgba(255,0,0,0.2);
  }
  @keyframes f35pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255,0,0,0.6), 0 0 30px rgba(255,0,0,0.3); border-color: #ff0000; }
    50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(255,50,0,0.9), 0 0 50px rgba(255,0,0,0.5); border-color: #ff4400; }
  }
  .stealth-btn.active, .stealth-btn:active {
    background: rgba(255,0,0,0.7);
    border-color: #ff0000;
    transform: scale(0.9);
    box-shadow: 0 0 20px rgba(255,0,0,0.8);
  }

  #btnUp { grid-area: up; }
  #btnDown { grid-area: down; }
  #btnLeft { grid-area: left; }
  #btnRight { grid-area: right; }

  @media (pointer: coarse), (max-width: 900px) {
    #mobileControls { display: flex; }
  }
  @media (pointer: fine) and (min-width: 901px) {
    #mobileControls { display: none !important; }
  }

  .char-card {
    background: rgba(30,40,80,0.7);
    border: 2px solid rgba(96,165,250,0.3);
    border-radius: 8px;
    padding: 6px 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    touch-action: manipulation;
    min-width: 0;
  }
  .char-card:hover, .char-card.selected {
    border-color: #60a5fa;
    background: rgba(40,60,120,0.8);
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(96,165,250,0.4);
  }
  .char-card img {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.3);
    display: block;
    margin: 0 auto 6px;
  }
  .char-card .char-label {
    color: #fff;
    font-size: 0.65rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
  }
  .char-card canvas {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    display: block;
    margin: 0 auto 6px;
  }
  .char-start-btn {
    display: inline-block;
    margin-top: 6px;
    padding: 8px 24px;
    background: linear-gradient(135deg, #0038b8, #0050d0);
    color: #fff;
    border: 2px solid #60a5fa;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-weight: 900;
    font-size: clamp(0.9rem,3vw,1.1rem);
    cursor: pointer;
    touch-action: manipulation;
    transition: all 0.2s;
  }
  .char-start-btn:hover { background: #0050d0; transform: scale(1.05); }
</style>
</head>
<body>

<div class="overlay" id="startScreen">
  <div class="hebrew-title">🇮🇱 שאגת הארי 🇮🇱</div>
  <div class="title">LION'S ROAR</div>
  <div class="subtitle">IRON DOME DEFENSE</div>
  <div class="motto">עם ישראל חי! 💪</div>
  <div class="flag-icon">
    <div class="flag-bg"></div>
    <div class="flag-stripe-top"></div>
    <div class="flag-stripe-bottom"></div>
    <div class="star-david-css"></div>
  </div>
  <div class="instructions">
    <span id="instrText"></span>
  </div>
</div>

<div class="overlay hidden" id="charSelectScreen" style="padding:8px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
  <div class="hebrew-title" style="font-size:clamp(0.9rem,3vw,1.2rem)">🦁 בחר את הלוחם שלך 🦁</div>
  <div class="title" style="font-size:clamp(0.75rem,2vw,1rem)">CHOOSE YOUR DEFENDER</div>
  <div id="charGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:min(95vw,420px);margin:8px auto;direction:ltr;"></div>
  <div id="charName" style="color:#60a5fa;font-size:clamp(0.8rem,2.5vw,1rem);font-weight:900;margin:4px 0;font-family:'Courier New',monospace;"></div>
  <div id="charDesc" style="color:#aaa;font-size:clamp(0.6rem,1.5vw,0.75rem);font-family:Arial,sans-serif;max-width:400px;margin:0 auto;"></div>
  <div id="highScoreDisplay" style="margin:4px auto;max-width:min(95vw,380px);max-height:12vh;overflow-y:auto;color:#fbbf24;font-family:'Courier New',monospace;font-size:clamp(0.65rem,1.8vw,0.8rem);text-align:center;"></div>
</div>

<div class="overlay hidden" id="citySelectScreen" style="padding:8px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
  <div class="hebrew-title" style="font-size:clamp(0.9rem,3vw,1.2rem)">🌍 בחר רקע 🌍</div>
  <div class="title" style="font-size:clamp(0.75rem,2vw,1rem)">CHOOSE BATTLEFIELD</div>
  <div id="cityGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:min(95vw,380px);margin:8px auto;direction:ltr;"></div>
  <div id="cityHighScoreDisplay" style="margin:4px auto;max-width:min(95vw,380px);max-height:10vh;overflow-y:auto;color:#fbbf24;font-family:'Courier New',monospace;font-size:clamp(0.65rem,1.8vw,0.8rem);text-align:center;"></div>
</div>

<div class="overlay hidden" id="countdownScreen">
  <div class="countdown-num" id="countdownNum">3</div>
  <div class="countdown-sub">הכן שאגת הארי...</div>
</div>

<div class="gameover-overlay hidden" id="gameOverScreen">
  <div class="hebrew-title">המשימה הסתיימה</div>
  <div class="title" style="font-size:clamp(1.8rem,6vw,2.5rem)">MISSION COMPLETE</div>
  <div class="score-display" id="finalScore">0</div>
  <div class="subtitle" id="finalWave" style="font-size:clamp(1rem,3vw,1.2rem)">גל 1</div>
  <div class="motto" id="endMessage">עם ישראל חי!</div>
  <div id="goHighScore" style="color:#fbbf24;font-family:'Courier New',monospace;font-size:clamp(0.8rem,2.5vw,1rem);margin:8px 0;"></div>
  <div id="goScoreList" style="color:#fbbf24;font-family:'Courier New',monospace;font-size:clamp(0.7rem,2vw,0.85rem);margin:4px 0;max-height:30vh;overflow-y:auto;"></div>
  <div class="tap-hint" id="tapHint" style="display:none">TAP TO PLAY AGAIN<br><span style="font-family:Arial,sans-serif;font-size:0.85em">לחץ כדי לשחק שוב</span></div>
</div>

<div id="hud">
  <div class="hud-item"><span>SCORE</span><span class="hud-value" id="hudScore">0</span></div>
  <div class="hud-item"><span>WAVE</span><span class="hud-value" id="hudWave">1</span></div>
  <div class="hud-item"><span>HP</span><span class="hud-value" id="hudHP">3</span></div>
  <div class="hud-item"><span>LIVES</span><div class="hud-lives" id="hudLives"></div></div>
  <div class="hud-item"><span>KILLS</span><span class="hud-value" id="hudKills">0</span></div>
</div>

<div id="rankDisplay" style="display:none;position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border:1px solid #ffd700;border-radius:8px;padding:6px 18px;color:#ffd700;font-family:'Courier New',monospace;font-size:14px;z-index:50;text-align:center;pointer-events:none;">
  <span id="rankIcon">⭐</span> <span id="rankName">טוראי</span> <span style="color:#aaa;font-size:11px;">|</span> <span id="rankNameEn" style="color:#aaa;font-size:11px;">Private</span>
</div>

<!-- NEW LAYOUT: Fire on LEFT, D-pad on RIGHT -->
<div id="mobileControls">
  <div class="controls-left">
    <button class="mobile-btn fire-btn" id="btnFire" type="button">FIRE<br>🔥</button>
    <button class="mobile-btn stealth-btn" id="btnStealth" type="button">F-35</button>
  </div>
  <div class="controls-right">
    <button class="mobile-btn" id="btnUp" type="button">▲</button>
    <button class="mobile-btn" id="btnLeft" type="button">◀</button>
    <button class="mobile-btn" id="btnRight" type="button">▶</button>
    <button class="mobile-btn" id="btnDown" type="button">▼</button>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- Firebase SDK (compat for simple REST-like usage) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
(function() {
  "use strict";

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0;
  var dpr = window.devicePixelRatio || 1;

  // Detect mobile BEFORE resize() uses it
  var isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  // Ellipse polyfill for older mobile browsers
  if (!CanvasRenderingContext2D.prototype.ellipse) {
    CanvasRenderingContext2D.prototype.ellipse = function(cx, cy, rx, ry, rot, sa, ea, ccw) {
      this.save();
      this.translate(cx, cy);
      this.rotate(rot);
      this.scale(rx, ry);
      this.arc(0, 0, 1, sa, ea, ccw);
      this.restore();
    };
  }

  // Mobile zoom out: scale the game world to show more area
  var mobileScale = 1;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    // On mobile, zoom out to show more game area
    if (isMobile) {
      mobileScale = 0.35;
      W = Math.round(W / mobileScale);
      H = Math.round(H / mobileScale);
    }
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = (W * mobileScale) + 'px';
    canvas.style.height = (H * mobileScale) + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function() {
    setTimeout(resize, 100);
    setTimeout(resize, 300);
  });

  canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
  var mcEl = document.getElementById('mobileControls');
  if (mcEl) mcEl.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

  // ===== CONSTANTS =====
  var MENU = 0, PLAYING = 1, WAVE_INTRO = 2, GAMEOVER = 3, BOSS_INTRO = 4;
  var DESKTOP_SCALE = isMobile ? 4.0 : 1.35;
  var DEFENDER_SCALE = isMobile ? 2.0 : 1.35;
  var BULLET_PU_SCALE = isMobile ? 5.0 : 1.0;
  var PW = Math.round(60 * DEFENDER_SCALE), PH = Math.round(52 * DEFENDER_SCALE), PSPEED = isMobile ? 6 : 4.5;
  var BASE_SHOT_CD = 200;
  var FONT_TITLE = "'Courier New', monospace";
  var FONT_HEB = "Arial, sans-serif";

  // ===== STATE =====
  var gameState = MENU;
  var score = 0, lives = 3, wave = 1;
  var playerHP = 3, maxPlayerHP = 3;
  var totalKills = 0;
  var killsSinceLastStealth = 0;
  var stealthReady = false;
  var stealthActive = false;
  var stealthPlane = null;
  var waveTimer = 0;
  var shakeX = 0, shakeY = 0, shakeDur = 0;
  var comboCount = 0, comboTimer = 0;
  var lastExtraLife = 0;

  // Power-ups
  var fireRateMultiplier = 1;
  var shotStreams = 1;
  var ammoType = 0;
  var activeAmmos = [];
  var ammoNames = ['NORMAL', 'EXPLOSIVE', 'PIERCING', 'ELECTRIC'];
  var ammoColors = ['#60a5fa', '#ff8844', '#22ff88', '#aa66ff'];
  var powerUpTimer = 0;

  var powerUps = [];
  var trumpTimer = 0;
  var guaranteedPowerUpTimer = 0;
  var hasMagnet = false;
  var magnetTimer = 0;

  var pBullets = [];
  var enemies = [];
  var eBullets = [];
  var particles = [];
  var floats = [];

  var px = 0, py = 0;
  var pInvincible = 0;
  var lastShot = 0;

  var eDirX = 1, eSpeed = 0.6;

  // Boss
  var boss = null;
  var bossIntroTimer = 0;

  // New enemy types
  var zapperDisableTimer = 0; // When > 0, player can't shoot
  var miniBoss = null; // Mini boss object
  var miniBosses = []; // Array of mini bosses

  // === PRELOAD REAL PHOTOS ===
  var khameneiImg = new Image();
  khameneiImg.crossOrigin = 'anonymous';
  khameneiImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Ali_Khamenei_2024_%283x4_cropped%29.jpg/200px-Ali_Khamenei_2024_%283x4_cropped%29.jpg';
  var khameneiLoaded = false;
  khameneiImg.onload = function() { khameneiLoaded = true; };

  var trumpImg = new Image();
  trumpImg.crossOrigin = 'anonymous';
  trumpImg.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/January_2025_Official_Presidential_Portrait_of_Donald_J._Trump.jpg/200px-January_2025_Official_Presidential_Portrait_of_Donald_J._Trump.jpg';
  var trumpLoaded = false;

      cachedScores = getLocalScores();

  function saveHighScore(name, scr, wv, kills, defender) {
    // Basic anti-cheat: cap reasonable values
    if (scr > 9999999 || wv > 500 || kills > 99999) return cachedScores;
    if (typeof name !== 'string' || name.length > 20) name = (name || '???').substring(0, 20);

    var entry = { name: name, score: scr, wave: wv, kills: kills, defender: defender || '', date: Date.now() };

    // Save locally first
    var local = getLocalScores();
    local.push(entry); local.sort(function(a,b) { return b.score - a.score; }); local = local.slice(0, 15);
    try { localStorage.setItem(HIGH_SCORE_KEY, JSON.stringify(local)); } catch(e) {}

    // Push to Firebase (each score is its own node — no race condition!)
    fbScoresRef.push(entry).catch(function(err) { console.warn('Firebase save error:', err); });

    // Update cached
    cachedScores.push(entry);
    cachedScores.sort(function(a,b) { return b.score - a.score; });
    cachedScores = cachedScores.slice(0, 15);
    return cachedScores;
  }

  // ===== SPAWN WAVE =====
  function spawnWave() {
    enemies = [];
    var rows = Math.min(2 + Math.floor(wave * 0.6), 5);
    var cols = Math.min(4 + wave, 10);
    var baseSpX = Math.min(55, (W - 100) / cols);
    var spX = Math.round(baseSpX * DESKTOP_SCALE);
    var totW = (cols - 1) * spX;
    var sx = Math.max(50, (W - totW) / 2);
    var sy = Math.round(65 * DESKTOP_SCALE);
    var hpBonus = Math.floor(wave / 3);

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var baseHp = r === 0 ? 2 : 1;
        var isSplitter = (wave >= 20 && r === 0 && Math.random() < 0.35);
        var isKamikaze = false;
        var isShielded = (wave >= 10 && wave < 25 && Math.random() < 0.2);
        var isZigzag = (wave >= 12 && Math.random() < 0.15);
        var isTank = (wave >= 15 && r === 0 && Math.random() < 0.15);
        // New types
        var isZapper = false;
        var isHeavy = false;
        var isMega = false;

        // Zapper: wave 20+
        if (wave >= 20 && !isSplitter && !isTank) {
          var maxZappers;
          if (wave >= 41) maxZappers = 10;
          else if (wave >= 31) maxZappers = 6;
          else maxZappers = 3;
          var zapperCount = enemies.filter(function(e) { return e.zapper; }).length;
          if (zapperCount < maxZappers && Math.random() < 0.12) {
            isZapper = true;
          }
        }

        // Heavy: wave 50+
        if (wave >= 50 && !isSplitter && !isZapper && !isTank && Math.random() < 0.18) {
          isHeavy = true;
        }

        var sz = isSplitter ? 22 : (isTank ? 24 : (isHeavy ? 26 : (isZapper ? 20 : 18)));
        sz = Math.round(sz * DESKTOP_SCALE);
        var hpMult = isSplitter ? 2 : (isTank ? 3 : (isHeavy ? 4 : (isShielded ? 1.5 : (isZapper ? 1.5 : 1))));
        enemies.push({
          x: sx + c * spX,
          y: sy + r * Math.round(46 * DESKTOP_SCALE),
          size: sz,
          hp: Math.ceil((baseHp + hpBonus) * hpMult),
          maxHp: Math.ceil((baseHp + hpBonus) * hpMult),
          flash: 0,
          shootCD: 2000 + Math.random() * 4000,
          splitter: isSplitter,
          kamikaze: isKamikaze,
          kamikazeActive: false,
          shielded: isShielded,
          shieldHP: isShielded ? 2 : 0,
          zigzag: isZigzag,
          zigzagPhase: Math.random() * 6.28,
          tank: isTank,
          // New properties
          zapper: isZapper,
          zapCD: isZapper ? (3000 + Math.random() * 2000) : 0,
          heavy: isHeavy,
          mega: false,
          atomBomb: false
        });
      }
    }

    // Spawn Mega enemies (wave 50+) - separate from grid
    if (wave >= 50) {
      var maxMegas = wave >= 71 ? 2 : 1;
      var megaCount = Math.floor(Math.random() * (maxMegas + 1)); // 0 to maxMegas
      for (var mi = 0; mi < megaCount; mi++) {
        var megaX = 80 + Math.random() * (W - 160);
        enemies.push({
          x: megaX,
          y: -30 - mi * 60,
          size: Math.round(40 * DESKTOP_SCALE),
          hp: Math.ceil(15 + wave * 0.5),
          maxHp: Math.ceil(15 + wave * 0.5),
          flash: 0,
          shootCD: 1500 + Math.random() * 1000,
          splitter: false, kamikaze: false, kamikazeActive: false,
          shielded: false, shieldHP: 0,
          zigzag: false, zigzagPhase: 0,
          tank: false,
          zapper: false, zapCD: 0,
          heavy: false,
          mega: true,
          megaMissileCD: 2000 + Math.random() * 1500,
          atomBomb: false
        });
      }
    }

    // Spawn Atom Bomb (wave 100+, 10% chance)
    if (wave >= 100 && Math.random() < 0.10) {
      enemies.push({
        x: W / 2 + (Math.random() - 0.5) * 200,
        y: -50,
        size: Math.round(32 * DESKTOP_SCALE),
        hp: Math.ceil(30 + wave * 0.3),
        maxHp: Math.ceil(30 + wave * 0.3),
        flash: 0,
        shootCD: 99999,
        splitter: false, kamikaze: false, kamikazeActive: false,
        shielded: false, shieldHP: 0,
        zigzag: false, zigzagPhase: 0,
        tank: false,
        zapper: false, zapCD: 0,
        heavy: false,
        mega: false,
        atomBomb: true,
        atomSpeed: 0.8
      });
    }

    eDirX = 1;
    eSpeed = Math.min(2.0, 0.4 + wave * 0.08);
    eBullets = [];
  
    // Mini bosses in regular waves (wave 15+)
    if (wave >= 15 && wave % 10 !== 0) { // Not on boss waves
      var numMinis = wave >= 50 ? (2 + Math.floor(Math.random() * 2)) : (wave >= 30 ? (1 + Math.floor(Math.random() * 2)) : 1);
      for (var mb = 0; mb < numMinis; mb++) {
        miniBosses.push({
          x: 80 + Math.random() * (W - 160),
          y: -40 - mb * 50,
          targetY: 60 + Math.random() * 100,
          size: Math.round(30 * DESKTOP_SCALE),
          hp: Math.ceil(15 + wave * 0.5),
          maxHp: Math.ceil(15 + wave * 0.5),
          flash: 0,
          moveTimer: Math.random() * 6.28,
          shootTimer: 0,
          roamTargetX: W / 2,
          roamTargetY: 100,
          bossCharIdx: Math.floor(Math.random() * 4) // random boss character
        });
      }
    }
  }

  // ===== SPAWN BOSS =====
  function spawnBoss() {
    var bossNum = Math.floor(wave / 3);
    var col = bossColors[(bossNum - 1) % bossColors.length];

    var baseHP, extraHP, bossSize, label;
    if (wave >= 12) {
      baseHP = 80;
      extraHP = Math.min(500, (bossNum - 1) * 25);
      bossSize = Math.round(65 * DESKTOP_SCALE);
      label = '💀 ' + bossCharacters[(bossNum-1) % bossCharacters.length].nameHe + ' #' + bossNum + ' 💀';
    } else if (wave >= 9) {
      baseHP = 55;
      extraHP = Math.min(300, (bossNum - 1) * 18);
      bossSize = Math.round(58 * DESKTOP_SCALE);
      label = '🔥 ' + bossCharacters[(bossNum-1) % bossCharacters.length].nameHe + ' #' + bossNum + ' 🔥';
    } else {
      baseHP = 30;
      extraHP = (bossNum - 1) * 10;
      bossSize = Math.round(50 * DESKTOP_SCALE);
      label = bossCharacters[(bossNum-1) % bossCharacters.length].nameHe + ' #' + bossNum;
    }

    // Varied spawn position (wave 30+)
    var spawnX = W / 2;
    var spawnY = -80;
    if (wave >= 30) {
      var spawnSide = Math.random();
      if (spawnSide < 0.33) {
        spawnX = 80 + Math.random() * (W - 160); // random X from top
      } else if (spawnSide < 0.66) {
        spawnX = 60; spawnY = -80; // from left
      } else {
        spawnX = W - 60; spawnY = -80; // from right
      }
    }

    var totalHP = baseHP + extraHP;
    // Early bosses (up to wave 30) are 5x stronger
    if (wave <= 30) totalHP = totalHP * 5;
    boss = {
      x: spawnX,
      y: spawnY,
      targetY: 100,
      size: bossSize,
      hp: totalHP,
      maxHp: totalHP,
      color: col,
      flash: 0,
      shootTimer: 0,
      shootPhase: 0,
      burstCount: 0,
      pauseTimer: 0,
      moveDir: 1,
      moveTimer: 0,
      bossNum: bossNum,
      label: label,
      attackPattern: 0,
      spiralAngle: 0,
      rageMode: false,
      chargeTimer: 0,
      chargeDir: 0,
      // New properties
      immunity: wave >= 30 ? 3.0 : 0, // 3 second immunity at wave 30+
      canRoam: wave >= 30, // full screen roaming at wave 30+
      roamTargetX: spawnX,
      roamTargetY: 100
    };

    // Spawn mini bosses at wave 60+
    if (wave >= 60) {
      var numMinis = wave >= 90 ? 2 : 1;
      miniBosses = [];
      for (var mb = 0; mb < numMinis; mb++) {
        miniBosses.push({
          x: 100 + Math.random() * (W - 200),
          y: -40 - mb * 50,
          targetY: 80 + Math.random() * 100,
          size: Math.round(35 * DESKTOP_SCALE),
          hp: Math.ceil(30 + wave * 0.3),
          maxHp: Math.ceil(30 + wave * 0.3),
          flash: 0,
          moveTimer: Math.random() * 6.28,
          shootTimer: 0,
          roamTargetX: W / 2,
          roamTargetY: 120,
          bossCharIdx: Math.floor(Math.random() * 4)
        });
      }
    } else {
      miniBosses = [];
    }
  }

  // ===== DRAW FUNCTIONS =====
  function drawBG() {
    // Advance scroll for forward motion feeling
    if (gameState === PLAYING || gameState === WAVE_INTRO || gameState === BOSS_INTRO) {
      bgScroll += 0.8;
    }

    // Sky gradient - city themed + wave color shift
    var ct = cityThemes[selectedCity] || cityThemes.telaviv;
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    var waveColor = wave < 6 ? 0 : Math.min((wave - 6) * 3, 40);
    grad.addColorStop(0, 'rgb(' + (ct.skyTop[0]+waveColor*0.3) + ',' + (ct.skyTop[1]-waveColor*0.1) + ',' + (ct.skyTop[2]+waveColor*0.2) + ')');
    grad.addColorStop(0.5, 'rgb(' + (ct.skyMid[0]+waveColor*0.2) + ',' + (ct.skyMid[1]-waveColor*0.2) + ',' + (ct.skyMid[2]+waveColor*0.3) + ')');
    grad.addColorStop(1, 'rgb(' + (ct.skyBot[0]+waveColor*0.1) + ',' + (ct.skyBot[1]-waveColor*0.15) + ',' + (ct.skyBot[2]+waveColor*0.2) + ')');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Ken Burns city photo background overlay
    var cbg = cityBgImages[selectedCity];
    if (cbg && cbg.loaded && cbg.img.naturalWidth > 0) {
      kenBurns.phase += dt * 0.08; // Very slow animation (~80 sec full cycle)
      var kb = kenBurns;
      var imgW = cbg.img.naturalWidth, imgH = cbg.img.naturalHeight;
      var canvasAspect = W / H, imgAspect = imgW / imgH;

      // Base scale to cover canvas (cover mode)
      var baseScale;
      if (canvasAspect > imgAspect) {
        baseScale = W / imgW;
      } else {
        baseScale = H / imgH;
      }

      // Ken Burns: slow zoom oscillation between 1.05x and 1.25x
      var zoomFactor = 1.05 + 0.2 * (0.5 + 0.5 * Math.sin(kb.phase * 0.7));
      var scale = baseScale * zoomFactor;

      var scaledW = imgW * scale, scaledH = imgH * scale;

      // Pan: slow drift using two sine waves at different frequencies
      var panX = (scaledW - W) * (0.5 + 0.3 * Math.sin(kb.phase * 0.5));
      var panY = (scaledH - H) * (0.5 + 0.3 * Math.sin(kb.phase * 0.37));

      var drawX = -panX;
      var drawY = -panY;

      // Opacity: slightly pulsing, dimmer during intense waves
      var waveOpacityMod = wave > 10 ? Math.max(0.12, kb.opacity - (wave - 10) * 0.005) : kb.opacity;
      ctx.globalAlpha = waveOpacityMod;
      ctx.drawImage(cbg.img, drawX, drawY, scaledW, scaledH);
      ctx.globalAlpha = 1;
    }

    var now = performance.now() / 1000;

    // Layer 1: Far stars (slowest parallax)
    var farOff = (bgScroll * 0.15) % 2000;
    for (var i = 0; i < bgStarsFar.length; i++) {
      var s = bgStarsFar[i];
      var sx = ((s.x - farOff) % 2000 + 2000) % 2000;
      sx = (sx / 2000) * W;
      ctx.globalAlpha = 0.2 + 0.5 * (0.5 + 0.5 * Math.sin(now * s.sp + s.ph));
      ctx.fillStyle = ct.starCol;
      ctx.beginPath();
      ctx.arc(sx, s.y * H * 0.7, s.sz, 0, 6.28);
      ctx.fill();
    }

    // Layer 2: Nebula clouds (slow parallax)
    var cloudOff = (bgScroll * 0.25) % 3000;
    for (var i = 0; i < bgClouds.length; i++) {
      var c = bgClouds[i];
      var cx = ((c.x - cloudOff) % 3000 + 3000) % 3000;
      cx = (cx / 3000) * (W + 200) - 100;
      ctx.globalAlpha = 0.6 + 0.3 * Math.sin(now * 0.3 + i);
      ctx.fillStyle = c.col;
      ctx.beginPath();
      ctx.arc(cx, c.y * H, c.r, 0, 6.28);
      ctx.fill();
    }

    // Layer 3: Mid stars (medium parallax)
    var midOff = (bgScroll * 0.4) % 2000;
    for (var i = 0; i < bgStarsMid.length; i++) {
      var s = bgStarsMid[i];
      var sx = ((s.x - midOff) % 2000 + 2000) % 2000;
      sx = (sx / 2000) * W;
      ctx.globalAlpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(now * s.sp + s.ph));
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(sx, s.y * H * 0.65, s.sz, 0, 6.28);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Layer 4: Ground (fastest parallax - closest)
    var gndOff = (bgScroll * 1.2) % 3000;
    ctx.fillStyle = ct.groundCol;
    ctx.fillRect(0, H - 32, W, 32);

    for (var i = 0; i < bldgs.length; i++) {
      var b = bldgs[i];
      var bx = ((b.x - gndOff) % 3000 + 3000) % 3000;
      bx = (bx / 3000) * (W + 100) - 50;
      if (bx < -50 || bx > W + 50) continue;
      ctx.fillStyle = ct.bldgCol;
      ctx.fillRect(bx, H - 32 - b.h, b.w, b.h);
    }
    // Building window lights
    for (var i = 0; i < bldgLights.length; i++) {
      var l = bldgLights[i];
      var lx = ((l.bx - gndOff) % 3000 + 3000) % 3000;
      lx = (lx / 3000) * (W + 100) - 50;
      if (lx < -5 || lx > W + 5) continue;
      ctx.fillStyle = l.col;
      ctx.globalAlpha = 0.4 + 0.3 * Math.sin(now * 2 + i * 0.7);
      ctx.fillRect(lx, H - 32 - l.by, 2, 2);
    }
    ctx.globalAlpha = 1;

    // Scrolling ground line for speed feeling
    ctx.strokeStyle = 'rgba(60,100,160,0.2)';
    ctx.lineWidth = 1;
    var lineOff = (bgScroll * 2) % 40;
    for (var gx = -lineOff; gx < W + 40; gx += 40) {
      ctx.beginPath();
      ctx.moveTo(gx, H - 2);
      ctx.lineTo(gx + 15, H - 2);
      ctx.stroke();
    }
  }

  function drawStar6(cx, cy, sz) {
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.moveTo(cx, cy - sz);
    ctx.lineTo(cx + sz * 0.866, cy + sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy + sz * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx, cy + sz);
    ctx.lineTo(cx + sz * 0.866, cy - sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy - sz * 0.5);
    ctx.closePath();
    ctx.fill();
  }

  function drawPhotoDefender(defInfo) {
    var x = px, y = py;
    var s = DEFENDER_SCALE;
    // Platform / vehicle
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.ellipse(x, y + 10*s, 28*s, 12*s, 0, 0, 6.28);
    ctx.fill();
    // Blue-white stripes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 26*s, y + 4*s, 52*s, 3*s);
    ctx.fillRect(x - 26*s, y + 14*s, 52*s, 3*s);
    // Star of David on platform
    drawStarOfDavid(x, y + 10*s, 6, '#ffffff');
    // Photo circle
    if (defInfo.img && defInfo.img.complete && defInfo.img.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y - 12*s, 18*s, 0, 6.28);
      ctx.clip();
      ctx.drawImage(defInfo.img, x - 18*s, y - 30*s, 36*s, 36*s);
      ctx.restore();
    }
    // Border around photo
    ctx.strokeStyle = '#60a5fa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y - 12*s, 18*s, 0, 6.28);
    ctx.stroke();
    // Glow
    ctx.shadowColor = '#0038b8';
    ctx.shadowBlur = 12;
    ctx.strokeStyle = '#0050d0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y - 12*s, 20*s, 0, 6.28);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Name label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px Arial, sans-serif';
    ctx.textAlign = 'center';
    var def = defenders.find(function(d) { return d.id === selectedDefender; });
    if (def) ctx.fillText(def.name, x, y + 26*s);
    // Rank badge
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 7px Arial, sans-serif';
    ctx.fillText(getCurrentRank().name, x, y - 34*s);
  }

  function drawPlayer() {
    ctx.save();
    if (pInvincible > 0 && Math.floor(performance.now() / 80) % 2 === 0) {
      ctx.globalAlpha = 0.3;
    }
    // Photo-based defenders
    var defInfo = getDefenderImg(selectedDefender);
    if (defInfo && selectedDefender !== 'lion') {
      drawPhotoDefender(defInfo);
      ctx.restore();
      return;
    }

    // Shield glow when invincible
    if (shieldTimer > 0) {
      var shR = 42 * DESKTOP_SCALE;
      var sg = ctx.createRadialGradient(px, py, 10, px, py, shR);
      sg.addColorStop(0, 'rgba(68,221,255,0.0)');
      sg.addColorStop(0.6, 'rgba(68,221,255,0.2)');
      sg.addColorStop(1, 'rgba(68,221,255,0.0)');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(px, py, shR, 0, 6.28); ctx.fill();
    }

    // === LION (Blue-White Israeli uniform) ===
    var s = DEFENDER_SCALE;

    // === Body - white with blue vest ===
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(px, py + 4*s, 18*s, 22*s, 0, 0, 6.28);
    ctx.fill();
    // Blue vest/armor overlay
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.ellipse(px, py + 2*s, 16*s, 18*s, 0, 0, 6.28);
    ctx.fill();
    // White stripe down center of vest
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(px - 3*s, py - 14*s, 6*s, 28*s);
    // Star of David on chest
    drawStar6(px, py - 2*s, 6*s);

    // === נילי on the back (below star) ===
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold ' + Math.round(9*s) + 'px ' + FONT_HEB;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('נילי', px, py + 12*s);

    // === Mane - blue and white tufts ===
    var maneY = py - 16*s;
    var mClrs = ['#0038b8', '#ffffff', '#0050d0', '#e0e8ff'];
    for (var mi = 0; mi < 14; mi++) {
      var ma = (mi / 14) * 6.28 + Math.sin(performance.now()/300 + mi) * 0.12;
      var mr = 16*s + Math.sin(performance.now()/200 + mi*1.3) * 2;
      ctx.fillStyle = mClrs[mi % 4];
      ctx.beginPath();
      ctx.arc(px + Math.cos(ma)*mr, maneY + Math.sin(ma)*mr*0.85, 6.5*s, 0, 6.28);
      ctx.fill();
    }

    // Head - white fur
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(px, maneY, 13*s, 0, 6.28);
    ctx.fill();

    // Blue headband/kippah
    ctx.fillStyle = '#0038b8';
    ctx.beginPath();
    ctx.arc(px, maneY - 5*s, 10*s, Math.PI, 2*Math.PI);
    ctx.fill();
    // Tiny star on headband
    drawStar6(px, maneY - 8*s, 3*s);

    // Ears
    ctx.fillStyle = '#e8e8f0';
    ctx.beginPath(); ctx.arc(px - 10*s, maneY - 10*s, 5*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 10*s, maneY - 10*s, 5*s, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#c0c8e0';
    ctx.beginPath(); ctx.arc(px - 10*s, maneY - 10*s, 3*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 10*s, maneY - 10*s, 3*s, 0, 6.28); ctx.fill();

    // Eyes - fierce blue
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(px - 5*s, maneY - 1*s, 4*s, 3.5*s, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px + 5*s, maneY - 1*s, 4*s, 3.5*s, 0, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#0038b8';
    ctx.beginPath(); ctx.arc(px - 5*s, maneY - 1*s, 2*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 5*s, maneY - 1*s, 2*s, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px - 4*s, maneY - 2*s, 0.8*s, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 6*s, maneY - 2*s, 0.8*s, 0, 6.28); ctx.fill();

    // Nose
    ctx.fillStyle = '#4466aa';
    ctx.beginPath();
    ctx.moveTo(px, maneY + 4*s);
    ctx.lineTo(px - 3*s, maneY + 7*s);
    ctx.lineTo(px + 3*s, maneY + 7*s);
    ctx.closePath();
    ctx.fill();

    // === OPEN JAW (roaring upward!) ===
    ctx.fillStyle = '#e0e8ff';
    ctx.beginPath();
    ctx.moveTo(px - 9*s, maneY - 10*s);
    ctx.quadraticCurveTo(px, maneY - 24*s, px + 9*s, maneY - 10*s);
    ctx.closePath();
    ctx.fill();
    // Inside mouth
    ctx.fillStyle = '#cc0000';
    ctx.beginPath();
    ctx.moveTo(px - 7*s, maneY - 10*s);
    ctx.quadraticCurveTo(px, maneY - 21*s, px + 7*s, maneY - 10*s);
    ctx.closePath();
    ctx.fill();
    // Teeth
    ctx.fillStyle = '#fff';
    for (var ti = -2; ti <= 2; ti++) {
      ctx.beginPath();
      var tx = px + ti * 3.2*s;
      ctx.moveTo(tx - 1.8*s, maneY - 11*s);
      ctx.lineTo(tx, maneY - 15*s);
      ctx.lineTo(tx + 1.8*s, maneY - 11*s);
      ctx.closePath();
      ctx.fill();
    }

    // Tail
    ctx.strokeStyle = '#0038b8';
    ctx.lineWidth = 3*s;
    ctx.lineCap = 'round';
    ctx.beginPath();
    var tailWag = Math.sin(performance.now()/150) * 8;
    ctx.moveTo(px, py + 24*s);
    ctx.quadraticCurveTo(px + 20*s + tailWag, py + 20*s, px + 15*s + tailWag, py + 10*s);
    ctx.stroke();
    // Tail tuft - white with blue
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(px + 15*s + tailWag, py + 10*s, 5*s, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#0038b8';
    ctx.beginPath(); ctx.arc(px + 15*s + tailWag, py + 10*s, 3*s, 0, 6.28); ctx.fill();

    // Front paws - white
    ctx.fillStyle = '#e8e8f0';
    ctx.beginPath(); ctx.ellipse(px - 13*s, py + 22*s, 5*s, 4*s, -0.2, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px + 13*s, py + 22*s, 5*s, 4*s, 0.2, 0, 6.28); ctx.fill();

    // === Blue-white glow from mouth ===
    var gs = 4 + Math.sin(performance.now() / 80) * 2;
    var eg = ctx.createRadialGradient(px, maneY - 24*s, 0, px, maneY - 24*s, gs * 3.5);
    eg.addColorStop(0, 'rgba(0,56,184,0.5)');
    eg.addColorStop(0.4, 'rgba(96,165,250,0.25)');
    eg.addColorStop(1, 'rgba(96,165,250,0)');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.arc(px, maneY - 24*s, gs * 3.5, 0, 6.28);
    ctx.fill();

    // HP bar below player
    var barW = PW;
    var barH = 4;
    var barX = px - barW/2;
    var barY = py + PH/2 + 4;
    ctx.fillStyle = 'rgba(255,0,0,0.4)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = playerHP >= 2 ? '#22ff44' : '#ff4444';
    ctx.fillRect(barX, barY, barW * (playerHP / maxPlayerHP), barH);

    // Zapper disable indicator
    if (zapperDisableTimer > 0) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(px, py, PW * 0.8, 0, 6.28);
      ctx.fill();
      ctx.fillStyle = '#00ffff';
      ctx.font = 'bold 14px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('⚡ DISABLED ⚡', px, py - PH/2 - 15);
      ctx.restore();
    }

    ctx.restore();
  }

  function drawStarOfDavid(cx, cy, sz, color) {
    ctx.fillStyle = color;
    // Triangle pointing up
    ctx.beginPath();
    ctx.moveTo(cx, cy - sz);
    ctx.lineTo(cx + sz * 0.866, cy + sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy + sz * 0.5);
    ctx.closePath();
    ctx.fill();
    // Triangle pointing down
    ctx.beginPath();
    ctx.moveTo(cx, cy + sz);
    ctx.lineTo(cx + sz * 0.866, cy - sz * 0.5);
    ctx.lineTo(cx - sz * 0.866, cy - sz * 0.5);
    ctx.closePath();
    ctx.fill();
  }

  function drawPBullet(b) {
    ctx.save();
    var col = '#60a5fa'; // default blue
    if (b.ammoTypes && b.ammoTypes.length > 0) {
      col = ammoColors[b.ammoTypes[0]];
      // If multiple ammos, cycle through colors
      if (b.ammoTypes.length > 1) {
        var colorIdx = Math.floor(performance.now() / 100) % b.ammoTypes.length;
        col = ammoColors[b.ammoTypes[colorIdx]];
      }
    }

    var bps = BULLET_PU_SCALE;
    // Trail glow
    var tg = ctx.createRadialGradient(b.x, b.y + 6*bps, 0, b.x, b.y + 6*bps, 12*bps);
    tg.addColorStop(0, col + '66');
    tg.addColorStop(1, col + '00');
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.arc(b.x, b.y + 6*bps, 12*bps, 0, 6.28); ctx.fill();

    // Spin the star
    ctx.translate(b.x, b.y);
    ctx.rotate(performance.now() / 200 + (b.x * 0.1));
    ctx.translate(-b.x, -b.y);

    var starSize = 5 * bps;
    if (b.ammoTypes && b.ammoTypes.length > 0) {
      if (b.ammoTypes.indexOf(1) !== -1) starSize = 7 * bps;       // Explosive - bigger star
      else if (b.ammoTypes.indexOf(2) !== -1) starSize = 5 * bps;   // Piercing
      else if (b.ammoTypes.indexOf(3) !== -1) starSize = 6 * bps;   // Electric
    }

    // Outer glow
    ctx.shadowColor = col;
    ctx.shadowBlur = 8 * bps;
    drawStarOfDavid(b.x, b.y, starSize, col);
    ctx.shadowBlur = 0;

    // Inner bright core
    drawStarOfDavid(b.x, b.y, starSize * 0.5, '#ffffff');

    ctx.restore();
  }

  function drawEnemy(e) {
    // Special enemy indicators
    if (e.splitter) {
      ctx.save();
      ctx.strokeStyle = '#ff44ff';
      ctx.lineWidth = 2;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size + 5, 0, 6.28);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    if (e.kamikazeActive) {
      ctx.save();
      var kamPulse = 0.5 + Math.sin(performance.now() / 100) * 0.5;
      ctx.strokeStyle = 'rgba(255,0,0,' + kamPulse + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size + 4, 0, 6.28);
      ctx.stroke();
      ctx.fillStyle = '#ff0000';
      ctx.font = 'bold 8px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('💣', e.x, e.y - e.size - 4);
      ctx.restore();
    }
    if (e.splitChild) {
      ctx.save();
      ctx.fillStyle = '#ff88ff';
      ctx.font = 'bold 6px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('mini', e.x, e.y - e.size - 2);
      ctx.restore();
    }
    // Shielded enemy: blue hexagon outline
    if (e.shielded && e.shieldHP > 0) {
      ctx.save();
      ctx.strokeStyle = '#44aaff';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7 + Math.sin(performance.now() / 200) * 0.3;
      ctx.beginPath();
      for (var hi = 0; hi < 6; hi++) {
        var ha = hi * Math.PI / 3 - Math.PI / 6;
        var hx = e.x + Math.cos(ha) * (e.size + 6);
        var hy = e.y + Math.sin(ha) * (e.size + 6);
        if (hi === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }
    // Tank enemy: thick armor outline
    if (e.tank) {
      ctx.save();
      ctx.strokeStyle = '#886633';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.rect(e.x - e.size * 0.6, e.y - e.size * 0.8, e.size * 1.2, e.size * 1.6);
      ctx.stroke();
      ctx.fillStyle = '#886633';
      ctx.font = 'bold 7px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('TANK', e.x, e.y - e.size - 4);
      ctx.restore();
    }
    // Zigzag visual: wavy trail
    if (e.zigzag) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,200,0,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (var wi = 0; wi < 10; wi++) {
        var wy = e.y + wi * 3;
        var wx = e.x + Math.sin(e.zigzagPhase - wi * 0.5) * 4;
        if (wi === 0) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
      }
      ctx.stroke();
      ctx.restore();
    }

    ctx.save();
    var x = e.x, y = e.y, s = e.size;
    if (e.flash > 0) ctx.globalAlpha = 0.4 + Math.sin(performance.now() / 40) * 0.3;

    ctx.fillStyle = e.tank ? '#556644' : '#4a5a3a';
    ctx.beginPath();
    ctx.ellipse(x, y, s * 0.26, s * 0.65, 0, 0, 6.28);
    ctx.fill();

    ctx.fillStyle = '#cc2222';
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.8);
    ctx.lineTo(x + s * 0.2, y + s * 0.35);
    ctx.lineTo(x - s * 0.2, y + s * 0.35);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#6b7a5a';
    ctx.beginPath();
    ctx.moveTo(x - s * 0.26, y - s * 0.4);
    ctx.lineTo(x - s * 0.5, y - s * 0.7);
    ctx.lineTo(x - s * 0.1, y - s * 0.2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + s * 0.26, y - s * 0.4);
    ctx.lineTo(x + s * 0.5, y - s * 0.7);
    ctx.lineTo(x + s * 0.1, y - s * 0.2);
    ctx.closePath();
    ctx.fill();

    var sw = s * 0.34, sh = s * 0.09;
    ctx.fillStyle = '#239f40';
    ctx.fillRect(x - sw/2, y - sh*1.7, sw, sh);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - sw/2, y - sh*0.5, sw, sh);
    ctx.fillStyle = '#da0000';
    ctx.fillRect(x - sw/2, y + sh*0.7, sw, sh);

    if (Math.random() > 0.35) {
      var fs = s * 0.2 + Math.random() * s * 0.18;
      var fg = ctx.createRadialGradient(x, y - s*0.65, 0, x, y - s*0.65, fs);
      fg.addColorStop(0, 'rgba(255,220,80,0.7)');
      fg.addColorStop(0.5, 'rgba(255,120,20,0.25)');
      fg.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(x, y - s*0.65, fs, 0, 6.28);
      ctx.fill();
    }

    if (e.maxHp > 1) {
      var hpRatio = e.hp / e.maxHp;
      var bw = s * 0.8;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x - bw/2, y - s - 4, bw, 3);
      ctx.fillStyle = hpRatio > 0.5 ? '#22ff44' : '#ff4444';
      ctx.fillRect(x - bw/2, y - s - 4, bw * hpRatio, 3);
    }

    // Zapper enemy: electric glow
    if (e.zapper) {
      ctx.save();
      var zapPulse = 0.5 + Math.sin(performance.now() / 150) * 0.5;
      ctx.strokeStyle = 'rgba(0,255,255,' + zapPulse + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size + 6, 0, 6.28);
      ctx.stroke();
      // Lightning bolt icon
      ctx.fillStyle = '#00ffff';
      ctx.font = 'bold 10px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('⚡', e.x, e.y - e.size - 4);
      ctx.restore();
    }
    // Heavy enemy: red armor
    if (e.heavy) {
      ctx.save();
      ctx.strokeStyle = '#ff2222';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.rect(e.x - e.size * 0.7, e.y - e.size * 0.9, e.size * 1.4, e.size * 1.8);
      ctx.stroke();
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 7px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('HEAVY', e.x, e.y - e.size - 4);
      ctx.restore();
    }
    // Mega enemy: large warship
    if (e.mega) {
    ctx.save();
    // Draw missile launcher battery
    var bx = e.x, by = e.y;
    var bs = e.size * 1.2;
    
    // Dark green military base
    ctx.fillStyle = '#334433';
    ctx.beginPath();
    ctx.rect(bx - bs, by - bs*0.5, bs*2, bs);
    ctx.fill();
    
    // Military camo pattern
    ctx.fillStyle = '#556655';
    for (var cx = -1; cx < 2; cx++) {
      for (var cy = -1; cy < 2; cy++) {
        ctx.fillRect(bx + cx*10 - 5, by + cy*8 - 4, 8, 6);
      }
    }
    
    // Draw 6 missile tubes pointing up
    ctx.strokeStyle = '#222222';
    ctx.lineWidth = 2;
    ctx.fillStyle = '#444444';
    var tubePositions = [-14, -6, 2, 8, 14, 20];
    for (var t = 0; t < tubePositions.length; t++) {
      var tx = bx + (tubePositions[t] - 10);
      var ty = by - bs * 0.3;
      // Tube circle
      ctx.beginPath();
      ctx.arc(tx, ty, 3, 0, 6.28);
      ctx.fill();
      ctx.stroke();
      // Slight upward angle
      ctx.beginPath();
      ctx.moveTo(tx - 1, ty + 1);
      ctx.lineTo(tx + 1, ty - 3);
      ctx.stroke();
    }
    
    // Orange warning glow
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(bx, by, bs + 8, 0, 6.28);
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // Label
    ctx.fillStyle = '#ff8800';
    ctx.font = 'bold 9px ' + FONT_TITLE;
    ctx.textAlign = 'center';
    ctx.fillText('MISSILE BATTERY', bx, by - bs * 0.8);
    ctx.restore();
  }
    // Atom Bomb: pulsing red/yellow warning
    if (e.atomBomb) {
      ctx.save();
      var abPulse = 0.5 + Math.sin(performance.now() / 100) * 0.5;
      ctx.strokeStyle = 'rgba(255,0,0,' + abPulse + ')';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size + 10, 0, 6.28);
      ctx.stroke();
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 12px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText('☢ ATOM ☢', e.x, e.y - e.size - 8);
      ctx.restore();
    }

    ctx.restore();
  }

  // ===== DRAW BOSS - Khamenei in spaceship =====
  function drawBoss() {
    if (!boss) return;
    ctx.save();
    var b = boss;
    var x = b.x, y = b.y, s = b.size;

    if (b.flash > 0) ctx.globalAlpha = 0.5 + Math.sin(performance.now() / 30) * 0.3;

    // === Spaceship body ===
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 1.3, s * 0.65, 0, 0, 6.28);
    ctx.fill();

    // Spaceship rim/edge detail
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 1.3, s * 0.65, 0, 0, 6.28);
    ctx.stroke();

    // Wings
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(x - s, y);
    ctx.lineTo(x - s * 1.8, y + s * 0.35);
    ctx.lineTo(x - s * 0.8, y + s * 0.1);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + s, y);
    ctx.lineTo(x + s * 1.8, y + s * 0.35);
    ctx.lineTo(x + s * 0.8, y + s * 0.1);
    ctx.closePath();
    ctx.fill();

    // === Glass dome ===
    var domeGrad = ctx.createRadialGradient(x, y - s*0.35, 0, x, y - s*0.2, s * 0.6);
    domeGrad.addColorStop(0, 'rgba(100,140,200,0.15)');
    domeGrad.addColorStop(0.7, 'rgba(60,80,120,0.3)');
    domeGrad.addColorStop(1, 'rgba(40,60,100,0.5)');
    ctx.fillStyle = domeGrad;
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.15, s * 0.55, s * 0.6, 0, Math.PI, 0);
    ctx.fill();
    // Dome shine
    ctx.strokeStyle = 'rgba(150,200,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.15, s * 0.55, s * 0.6, 0, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // === CHARACTER: Rotating bosses (real photos) ===
    var bossCharIdx = (b.bossNum - 1) % bossCharacters.length;
    var bossChar = bossCharacters[bossCharIdx];
    var bossImg = bossChar.img();
    var bossImgLoaded = bossChar.loaded();
    if (bossImgLoaded) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y - s * 0.2, s * 0.48, 0, 6.28);
      ctx.clip();
      var imgSize = s * 1.0;
      ctx.drawImage(bossImg, x - imgSize * 0.5, y - s * 0.2 - imgSize * 0.6, imgSize, imgSize * 1.25);
      ctx.restore();
    } else {
      var headY = y - s * 0.35;
      var headR = s * 0.22;
      ctx.fillStyle = '#e8c8a0';
      ctx.beginPath(); ctx.arc(x, headY, headR, 0, 6.28); ctx.fill();
    }

    // Rage mode aura
    if (b.rageMode) {
      var rageGlow = ctx.createRadialGradient(x, y, 0, x, y, s * 2);
      rageGlow.addColorStop(0, 'rgba(255,0,0,0)');
      rageGlow.addColorStop(0.5, 'rgba(255,0,0,' + (0.15 + Math.sin(performance.now()/150) * 0.1) + ')');
      rageGlow.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = rageGlow;
      ctx.beginPath();
      ctx.arc(x, y, s * 2, 0, 6.28);
      ctx.fill();
    }

    // Engine glow under ship
    var glowSize = b.rageMode ? s*0.7 : s*0.5;
    var glow = ctx.createRadialGradient(x, y + s*0.55, 0, x, y + s*0.55, glowSize);
    glow.addColorStop(0, b.rageMode ? 'rgba(255,0,0,0.8)' : 'rgba(255,100,0,0.6)');
    glow.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y + s*0.55, glowSize, 0, 6.28);
    ctx.fill();

    // === HP bar ===
    var hpRatio = b.hp / b.maxHp;
    var barW = s * 2.2;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(x - barW/2, y - s - 18, barW, 6);
    ctx.fillStyle = hpRatio > 0.3 ? '#ff4444' : '#ffff00';
    ctx.fillRect(x - barW/2, y - s - 18, barW * hpRatio, 6);

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px ' + FONT_TITLE;
    ctx.textAlign = 'center';
    ctx.fillText(b.label, x, y - s - 22);
    ctx.fillText(b.hp + '/' + b.maxHp, x, y - s - 10);

    ctx.restore();
  }

      ctx.fill();

      ctx.strokeStyle = 'rgba(150,100,200,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(x, y, s * 1.3, s * 0.65, 0, 0, 6.28);

      ctx.lineTo(x - s*1.8, y - s*0.4);
      ctx.closePath();
      ctx.fill();
      // Right wing
      ctx.beginPath();
      ctx.moveTo(x + s*1.3, y);
      ctx.lineTo(x + s*1.8, y + s*0.4);
      ctx.lineTo(x + s*1.8, y - s*0.4);
      ctx.closePath();
      ctx.fill();

      // Draw character image in dome
      if (charObj && charObj.loaded()) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y - s * 0.1, s * 0.38, 0, 6.28);
        ctx.clip();
        var imgSize = s * 0.8;
        try {
          ctx.drawImage(charObj.img(), x - imgSize/2, y - s * 0.1 - imgSize * 0.45, imgSize, imgSize);
        } catch(err) {}
        ctx.restore();
      } else {
        // Fallback: colored dome
        ctx.fillStyle = 'rgba(200,100,255,0.5)';
        ctx.beginPath();
        ctx.arc(x, y - s * 0.1, s * 0.35, 0, 6.28);
        ctx.fill();
      }

      // Front dome
      ctx.fillStyle = 'rgba(100,150,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(x, y - s*0.15, s*0.5, s*0.3, 0, 0, 6.28);
      ctx.fill();

      // HP bar
      if (mb.hp > 0) {
        var hpPercent = Math.max(0, mb.hp / mb.maxHp);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(x - s*0.7, y + s*0.8, s*1.4, 3);
        ctx.fillStyle = '#33ff33';
        ctx.fillRect(x - s*0.7, y + s*0.8, s*1.4*hpPercent, 3);
      }

      // Character name label
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 8px ' + FONT_TITLE;
      ctx.textAlign = 'center';
      ctx.fillText(charName, x, y + s + 10);

      ctx.restore();
    }
  }

  function drawEBullet(b) {

      ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.arc(b.x, b.y, 1.5, 0, 6.28);
      ctx.fill();
    }

    else if (b.isMegaMissile) {
      ctx.shadowColor = '#ff8800';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#ff8800';

      ctx.beginPath();
      ctx.moveTo(b.x, b.y - 5);
      ctx.lineTo(b.x + 2.5, b.y + 4);
      ctx.lineTo(b.x, b.y + 2);
      ctx.lineTo(b.x - 2.5, b.y + 4);

      ctx.fill();

      ctx.beginPath();

      ctx.fillStyle = '#fff';
